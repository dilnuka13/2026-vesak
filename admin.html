<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Vesak System - Admin Panel</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
            }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- PDF Libraries (jsPDF + autoTable) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    body {
      background-color: #020617;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
    }
    /* Simple custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body class="min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const supabaseUrl = 'https://yqpkgybmjdovdnmekpnw.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxcGtneWJtamRvdmRubWVrcG53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjUwMjAsImV4cCI6MjA5MjEwMTAyMH0.7C9jv1_zDRxSMCgs0tWfiNUGXGOkCLz5RE0CCDoc_yA';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Utilities
    const exportToCSV = (filename, rows) => {
      const csvContent = "\uFEFF" + rows.map(r => r.map(cell => {
        if (cell === null || cell === undefined) return '""';
        return `"${cell.toString().replace(/"/g, '""')}"`;
      }).join(",")).join("\n");
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", filename + ".csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    const exportToPDF = (title, columns, dataRows, filename) => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(16);
      doc.text(title, 14, 22);
      doc.autoTable({
        startY: 30,
        head: [columns],
        body: dataRows,
        theme: 'grid',
        styles: { font: 'helvetica', fontSize: 9 },
        headStyles: { fillColor: [34, 197, 94] }
      });
      doc.save(filename + ".pdf");
    };

    // Components
    const InputField = ({ label, type="text", name, value, onChange, options }) => (
      <div className="flex flex-col gap-1 mb-4 w-full">
        <label className="text-sm font-medium text-slate-300">{label}</label>
        {type === 'textarea' ? (
          <textarea name={name} value={value || ''} onChange={onChange} className="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2 outline-none h-20 focus:border-brand-500"></textarea>
        ) : type === 'select' ? (
          <select name={name} value={value || ''} onChange={onChange} className="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2 outline-none focus:border-brand-500">
             <option value="">Select Option</option>
             {options && options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        ) : (
          <input type={type} name={name} value={value || ''} onChange={onChange} className="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2 outline-none focus:border-brand-500" />
        )}
      </div>
    );

    const Modal = ({ title, children, onClose }) => (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div className="bg-slate-900 border border-slate-700 rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto relative shadow-2xl">
          <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
          <h2 className="text-xl font-bold mb-6 text-brand-400 border-b border-slate-800 pb-2">{title}</h2>
          {children}
        </div>
      </div>
    );

    const AdminApp = () => {
      const [loggedIn, setLoggedIn] = useState(false);
      const [creds, setCreds] = useState({ user: '', pass: '' });
      const [error, setError] = useState('');

      const [incomes, setIncomes] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('incomes');
      
      const [editIncome, setEditIncome] = useState(null);
      const [editExpense, setEditExpense] = useState(null);
      const [actionLoading, setActionLoading] = useState(false);

      // Filters
      const [searchTerm, setSearchTerm] = useState('');
      const [filterDate, setFilterDate] = useState('');

      const fetchData = async () => {
        setLoading(true);
        const [inc, exp] = await Promise.all([
          supabase.from('incomes').select('*').order('created_at', { ascending: false }),
          supabase.from('expenses').select('*').order('created_at', { ascending: false })
        ]);
        if (inc.data) setIncomes(inc.data);
        if (exp.data) setExpenses(exp.data);
        setLoading(false);
      };

      const handleLogin = (e) => {
        e.preventDefault();
        if (creds.user === 'dilnuka' && creds.pass === '20052005') {
          setLoggedIn(true);
          fetchData();
        } else {
          setError('Invalid username or password');
        }
      };

      const handleDeleteIncome = async (id) => {
        if (!window.confirm("Are you sure you want to delete this income record? / මේ වාර්තාව මකන්න අවශ්‍යද?")) return;
        setActionLoading(true);
        try {
          const { error } = await supabase.from('incomes').delete().eq('id', id);
          if (error) throw error;
          fetchData();
        } catch (err) {
          alert("Error deleting record: " + err.message);
        } finally {
          setActionLoading(false);
        }
      };

      const handleDeleteExpense = async (id) => {
        if (!window.confirm("Are you sure you want to delete this expense record? / මේ වාර්තාව මකන්න අවශ්‍යද?")) return;
        setActionLoading(true);
        try {
          const { error } = await supabase.from('expenses').delete().eq('id', id);
          if (error) throw error;
          fetchData();
        } catch (err) {
          alert("Error deleting record: " + err.message);
        } finally {
          setActionLoading(false);
        }
      };

      const handleSaveIncome = async (e) => {
        e.preventDefault();
        setActionLoading(true);
        try {
          const { error } = await supabase.from('incomes').update(editIncome).eq('id', editIncome.id);
          if(error) throw error;
          setEditIncome(null);
          fetchData();
        } catch(err) {
          alert("Error saving record: " + err.message);
        } finally {
          setActionLoading(false);
        }
      };

      const handleSaveExpense = async (e) => {
        e.preventDefault();
        setActionLoading(true);
        try {
          const { error } = await supabase.from('expenses').update(editExpense).eq('id', editExpense.id);
          if(error) throw error;
          setEditExpense(null);
          fetchData();
        } catch(err) {
          alert("Error saving record: " + err.message);
        } finally {
          setActionLoading(false);
        }
      };

      // Filtering Logic
      const filteredIncomes = incomes.filter(inc => {
        if(filterDate && inc.date !== filterDate) return false;
        if(searchTerm) {
          const s = searchTerm.toLowerCase();
          return (inc.name?.toLowerCase().includes(s) || inc.id?.toString().includes(s) || inc.item_description?.toLowerCase().includes(s));
        }
        return true;
      });

      const filteredExpenses = expenses.filter(exp => {
        if(filterDate && exp.date !== filterDate) return false;
        if(searchTerm) {
          const s = searchTerm.toLowerCase();
          return (exp.reason?.toLowerCase().includes(s) || exp.withdrawer_name?.toLowerCase().includes(s));
        }
        return true;
      });

      // Export Handlers
      const exportIncomesCSV = () => {
        const headers = ["ID", "Date", "Name", "Phone", "Type", "Status", "Amount", "Reported By", "Donor Category", "Item Description"];
        const rows = [headers, ...filteredIncomes.map(i => [
          i.id, i.date, i.name, i.phone_number || '-', i.donation_type, i.status, 
          i.amount || 0, i.reported_by || '-', i.donor_category || '-', i.item_description || '-'
        ])];
        exportToCSV("Admin_Incomes_Report", rows);
      };

      const exportIncomesPDF = () => {
        const headers = ["ID", "Date", "Name", "Type", "Status", "Amount/Details"];
        const rows = filteredIncomes.map(i => [
          i.id, i.date, i.name, i.donation_type, i.status, 
          i.donation_type === 'Cash' ? `Rs.${i.amount}` : `${i.item_description} (x${i.quantity})`
        ]);
        exportToPDF("Income Records (Admin Report)", headers, rows, "Admin_Incomes_Report");
      };

      const exportExpensesCSV = () => {
        const headers = ["ID", "Date", "Time", "Reason", "Withdrawer", "Amount"];
        const rows = [headers, ...filteredExpenses.map(e => [
          e.id, e.date, e.time, e.reason, e.withdrawer_name, e.amount_taken
        ])];
        exportToCSV("Admin_Expenses_Report", rows);
      };

      const exportExpensesPDF = () => {
        const headers = ["ID", "Date", "Reason", "Withdrawer", "Amount"];
        const rows = filteredExpenses.map(e => [
          e.id, e.date, e.reason, e.withdrawer_name, `Rs.${e.amount_taken}`
        ]);
        exportToPDF("Expense Records (Admin Report)", headers, rows, "Admin_Expenses_Report");
      };

      if (!loggedIn) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="glass p-8 rounded-2xl w-full max-w-md">
              <div className="text-center mb-8">
                <h1 className="text-3xl font-bold text-white tracking-tight">Admin Login</h1>
                <p className="text-slate-400 text-sm mt-2">Vesak Lantern System 2026</p>
              </div>
              <form onSubmit={handleLogin} className="flex flex-col gap-4">
                {error && <div className="text-red-400 bg-red-500/10 p-3 rounded-lg text-sm text-center border border-red-500/20">{error}</div>}
                <InputField label="Username (පරිශීලක නාමය)" name="user" value={creds.user} onChange={e => setCreds({...creds, user: e.target.value})} />
                <InputField label="Password (මුරපදය)" type="password" name="pass" value={creds.pass} onChange={e => setCreds({...creds, pass: e.target.value})} />
                <button type="submit" className="mt-4 bg-brand-600 hover:bg-brand-500 text-white font-bold py-3 rounded-lg transition shadow-lg">Login / පිවිසෙන්න</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
          <header className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 glass p-6 rounded-2xl">
            <div>
              <h1 className="text-2xl font-bold text-white">Administrator Dashboard</h1>
              <p className="text-brand-400 text-sm">Manage & Edit System Records</p>
            </div>
            <div className="flex gap-4">
              <a href="index.html" className="px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition flex items-center text-sm font-medium">Home</a>
              <button onClick={fetchData} className="px-4 py-2 bg-brand-600 rounded-lg hover:bg-brand-500 transition text-sm font-medium shadow-[0_0_10px_rgba(34,197,94,0.3)]">Refresh DB</button>
              <button onClick={() => setLoggedIn(false)} className="px-4 py-2 bg-red-600/20 text-red-500 rounded-lg hover:bg-red-600/30 transition text-sm font-medium">Logout</button>
            </div>
          </header>

          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div className="flex gap-2">
              <button onClick={() => {setActiveTab('incomes'); setSearchTerm(''); setFilterDate('');}} className={`px-6 py-2 rounded-lg font-medium transition ${activeTab === 'incomes' ? 'bg-brand-500 text-white shadow-lg' : 'glass text-slate-400 hover:text-white'}`}>Income Records</button>
              <button onClick={() => {setActiveTab('expenses'); setSearchTerm(''); setFilterDate('');}} className={`px-6 py-2 rounded-lg font-medium transition ${activeTab === 'expenses' ? 'bg-red-500 text-white shadow-lg' : 'glass text-slate-400 hover:text-white'}`}>Expense Records</button>
            </div>
            
            <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
              <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-brand-500 outline-none" />
              <input type="text" placeholder="Search by name, ID..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-brand-500 outline-none" />
              <div className="flex gap-2">
                <button onClick={activeTab === 'incomes' ? exportIncomesCSV : exportExpensesCSV} className="px-3 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 text-sm font-medium transition border border-slate-700">CSV</button>
                <button onClick={activeTab === 'incomes' ? exportIncomesPDF : exportExpensesPDF} className="px-3 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 text-sm font-medium transition border border-slate-700">PDF</button>
              </div>
            </div>
          </div>

          <div className="glass rounded-2xl overflow-x-auto min-h-[400px]">
            {loading ? <div className="p-8 text-center text-slate-400">Fetching records from database...</div> : (
              <table className="w-full text-left text-sm whitespace-nowrap">
                <thead className="bg-slate-900/80 text-slate-400 text-xs uppercase border-b border-slate-800">
                  {activeTab === 'incomes' ? (
                    <tr>
                      <th className="p-4 rounded-tl-lg">ID</th>
                      <th className="p-4">Date</th>
                      <th className="p-4">Name / Contact</th>
                      <th className="p-4">Type</th>
                      <th className="p-4">Details</th>
                      <th className="p-4">Amount</th>
                      <th className="p-4">Status</th>
                      <th className="p-4 rounded-tr-lg text-right">Actions</th>
                    </tr>
                  ) : (
                    <tr>
                      <th className="p-4 rounded-tl-lg">ID</th>
                      <th className="p-4">Date & Time</th>
                      <th className="p-4">Withdrawer</th>
                      <th className="p-4">Reason</th>
                      <th className="p-4">Amount Taken</th>
                      <th className="p-4 rounded-tr-lg text-right">Actions</th>
                    </tr>
                  )}
                </thead>
                <tbody>
                  {activeTab === 'incomes' && filteredIncomes.map(inc => (
                    <tr key={inc.id} className="border-b border-slate-800/50 hover:bg-slate-800/40 transition">
                      <td className="p-4 font-mono text-xs text-slate-500">#{inc.id}</td>
                      <td className="p-4 text-slate-300">{inc.date}</td>
                      <td className="p-4">
                        <div className="font-medium text-white">{inc.name}</div>
                        <div className="text-[10px] text-slate-500 mt-0.5">{inc.phone_number || '-'}</div>
                      </td>
                      <td className="p-4"><span className={`px-2 py-1 rounded text-[10px] ${inc.donation_type === 'Cash' ? 'bg-brand-500/10 text-brand-400' : 'bg-purple-500/10 text-purple-400'}`}>{inc.donation_type}</span></td>
                      <td className="p-4 max-w-[150px] truncate text-slate-300">
                        {inc.donation_type === 'Cash' ? inc.donor_category : `${inc.item_description} (x${inc.quantity})`}
                        <div className="text-[9px] text-slate-500 mt-1">Rep: {inc.reported_by}</div>
                      </td>
                      <td className="p-4 text-brand-400 font-semibold">{inc.amount ? `Rs.${inc.amount}` : '-'}</td>
                      <td className="p-4">
                        <span className={`px-2 py-1 rounded text-xs ${inc.status === 'Received Today' ? 'bg-brand-500/20 text-brand-400' : 'bg-yellow-500/20 text-yellow-400'}`}>
                          {inc.status}
                        </span>
                      </td>
                      <td className="p-4 text-right">
                        <button onClick={() => setEditIncome(inc)} disabled={actionLoading} className="px-3 py-1.5 bg-blue-500/20 text-blue-400 rounded-md mr-2 hover:bg-blue-500/30 transition text-xs font-semibold disabled:opacity-50">Edit</button>
                        <button onClick={() => handleDeleteIncome(inc.id)} disabled={actionLoading} className="px-3 py-1.5 bg-red-500/20 text-red-400 rounded-md hover:bg-red-500/30 transition text-xs font-semibold disabled:opacity-50">Delete</button>
                      </td>
                    </tr>
                  ))}
                  
                  {activeTab === 'expenses' && filteredExpenses.map(exp => (
                    <tr key={exp.id} className="border-b border-slate-800/50 hover:bg-slate-800/40 transition">
                      <td className="p-4 font-mono text-xs text-slate-500">#{exp.id}</td>
                      <td className="p-4 text-slate-300">{exp.date} <span className="text-xs ml-1 opacity-70">{exp.time}</span></td>
                      <td className="p-4 font-medium text-white">{exp.withdrawer_name}</td>
                      <td className="p-4 max-w-[200px] truncate text-slate-300">{exp.reason}</td>
                      <td className="p-4 text-red-400 font-semibold">Rs.{exp.amount_taken}</td>
                      <td className="p-4 text-right">
                        <button onClick={() => setEditExpense(exp)} disabled={actionLoading} className="px-3 py-1.5 bg-blue-500/20 text-blue-400 rounded-md mr-2 hover:bg-blue-500/30 transition text-xs font-semibold disabled:opacity-50">Edit</button>
                        <button onClick={() => handleDeleteExpense(exp.id)} disabled={actionLoading} className="px-3 py-1.5 bg-red-500/20 text-red-400 rounded-md hover:bg-red-500/30 transition text-xs font-semibold disabled:opacity-50">Delete</button>
                      </td>
                    </tr>
                  ))}

                  {(activeTab === 'incomes' && filteredIncomes.length === 0) && (
                    <tr><td colSpan="8" className="p-8 text-center text-slate-500">No income records found.</td></tr>
                  )}
                  {(activeTab === 'expenses' && filteredExpenses.length === 0) && (
                    <tr><td colSpan="6" className="p-8 text-center text-slate-500">No expense records found.</td></tr>
                  )}
                </tbody>
              </table>
            )}
          </div>

          {/* Edit Income Modal */}
          {editIncome && (
            <Modal title={`Edit Income Record (#${editIncome.id})`} onClose={() => setEditIncome(null)}>
              <form onSubmit={handleSaveIncome}>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                  <InputField label="Name" value={editIncome.name} onChange={e => setEditIncome({...editIncome, name: e.target.value})} />
                  <InputField label="Phone Number" value={editIncome.phone_number} onChange={e => setEditIncome({...editIncome, phone_number: e.target.value})} />
                  <InputField label="Date" type="date" value={editIncome.date} onChange={e => setEditIncome({...editIncome, date: e.target.value})} />
                  <InputField label="Donation Type" type="select" options={['Cash', 'Goods']} value={editIncome.donation_type} onChange={e => setEditIncome({...editIncome, donation_type: e.target.value})} />
                  
                  {editIncome.donation_type === 'Cash' ? (
                    <>
                      <InputField label="Amount (Rs)" type="number" value={editIncome.amount} onChange={e => setEditIncome({...editIncome, amount: e.target.value})} />
                      <InputField label="Donor Category" type="select" options={['Main Donor', 'Regular Donor']} value={editIncome.donor_category} onChange={e => setEditIncome({...editIncome, donor_category: e.target.value})} />
                    </>
                  ) : (
                    <>
                      <InputField label="Item Description" value={editIncome.item_description} onChange={e => setEditIncome({...editIncome, item_description: e.target.value})} />
                      <InputField label="Quantity" type="number" value={editIncome.quantity} onChange={e => setEditIncome({...editIncome, quantity: e.target.value})} />
                    </>
                  )}
                  
                  <InputField label="Status" type="select" options={['Received Today', 'Promised']} value={editIncome.status} onChange={e => setEditIncome({...editIncome, status: e.target.value})} />
                  <InputField label="Reported By" value={editIncome.reported_by} onChange={e => setEditIncome({...editIncome, reported_by: e.target.value})} />
                  
                  <div className="md:col-span-2">
                    <InputField label="Description / Notes" type="textarea" value={editIncome.description} onChange={e => setEditIncome({...editIncome, description: e.target.value})} />
                  </div>
                </div>
                <div className="flex gap-3 mt-4">
                  <button type="button" onClick={() => setEditIncome(null)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-white font-bold transition">Cancel</button>
                  <button type="submit" disabled={actionLoading} className="flex-1 bg-brand-600 hover:bg-brand-500 text-white font-bold py-3 rounded-lg transition disabled:opacity-50">Save Changes</button>
                </div>
              </form>
            </Modal>
          )}

          {/* Edit Expense Modal */}
          {editExpense && (
            <Modal title={`Edit Expense Record (#${editExpense.id})`} onClose={() => setEditExpense(null)}>
              <form onSubmit={handleSaveExpense}>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                  <div className="md:col-span-2">
                    <InputField label="Reason" value={editExpense.reason} onChange={e => setEditExpense({...editExpense, reason: e.target.value})} />
                  </div>
                  <InputField label="Withdrawer Name" value={editExpense.withdrawer_name} onChange={e => setEditExpense({...editExpense, withdrawer_name: e.target.value})} />
                  <InputField label="Amount Taken" type="number" value={editExpense.amount_taken} onChange={e => setEditExpense({...editExpense, amount_taken: e.target.value})} />
                  <InputField label="Date" type="date" value={editExpense.date} onChange={e => setEditExpense({...editExpense, date: e.target.value})} />
                  <InputField label="Time" type="time" value={editExpense.time} onChange={e => setEditExpense({...editExpense, time: e.target.value})} />
                </div>
                <div className="flex gap-3 mt-6">
                  <button type="button" onClick={() => setEditExpense(null)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-white font-bold transition">Cancel</button>
                  <button type="submit" disabled={actionLoading} className="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg transition disabled:opacity-50">Save Changes</button>
                </div>
              </form>
            </Modal>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp />);
  </script>
</body>
</html>
