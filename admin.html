<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Vesak System - Admin Panel</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
            }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- PDF Libraries (jsPDF + autoTable) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    body {
      background-color: #020617;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: none;
    }
    /* Simple custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    
    /* Toast Animations */
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
    /* Toast Styles */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 90vw;
    }
    @media (max-width: 640px) {
      #toast-container {
        right: 50%;
        transform: translateX(50%);
        top: 20px;
        width: calc(100% - 40px);
      }
      .toast {
        width: 100%;
        justify-content: center;
        text-align: center;
      }
    }
    .toast {
      padding: 12px 20px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      gap: 12px;
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    .toast.success { background: rgba(22, 163, 74, 0.9); border: 1px solid rgba(34, 197, 94, 0.4); }
    .toast.error { background: rgba(220, 38, 38, 0.9); border: 1px solid rgba(239, 68, 68, 0.4); }
    .toast-close {
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
      font-size: 18px;
    }
    .toast-close:hover { opacity: 1; }

    /* Responsive Table Styles */
    @media (max-width: 768px) {
      .responsive-table thead { display: none; }
      .responsive-table, .responsive-table tbody, .responsive-table tr, .responsive-table td { 
        display: block; 
        width: 100%; 
      }
      .responsive-table tr { 
        margin-bottom: 1.5rem; 
        padding: 1rem; 
        background: rgba(15, 23, 42, 0.6);
        border-radius: 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      .responsive-table td { 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        padding: 0.75rem 0; 
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        text-align: right;
        white-space: normal;
      }
      .responsive-table td::before { 
        content: attr(data-label); 
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        font-size: 0.7rem;
        letter-spacing: 0.05em;
        text-align: left;
        padding-right: 1rem;
      }
      .responsive-table td:last-child { 
        border-bottom: none; 
        margin-top: 0.5rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        justify-content: flex-end;
      }
      .responsive-table td[data-label="Actions"]::before, 
      .responsive-table td[data-label="Details"]::before {
        display: none;
      }
      .responsive-table td[data-label="Actions"],
      .responsive-table td[data-label="Details"] {
        justify-content: center;
        width: 100%;
      }
    }
  </style>
</head>
<body class="min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const supabaseUrl = 'https://yqpkgybmjdovdnmekpnw.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxcGtneWJtamRvdmRubWVrcG53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjUwMjAsImV4cCI6MjA5MjEwMTAyMH0.7C9jv1_zDRxSMCgs0tWfiNUGXGOkCLz5RE0CCDoc_yA';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    window.showToast = (message, type = 'success') => {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px;">
          ${type === 'success' ? '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : '<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>'}
          <span>${message.replace('\n', '<br/>')}</span>
        </div>
        <span class="toast-close" onclick="this.parentElement.remove()">&times;</span>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'fadeOut 0.3s ease-out forwards';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    };

    // Utilities
    const exportToCSV = (filename, rows) => {
      const csvContent = "\uFEFF" + rows.map(r => r.map(cell => {
        if (cell === null || cell === undefined) return '""';
        return `"${cell.toString().replace(/"/g, '""')}"`;
      }).join(",")).join("\n");
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", filename + ".csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    const exportToPDF = (title, columns, dataRows, filename) => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(16);
      doc.text(title, 14, 22);
      doc.autoTable({
        startY: 30,
        head: [columns],
        body: dataRows,
        theme: 'grid',
        styles: { font: 'helvetica', fontSize: 9 },
        headStyles: { fillColor: [34, 197, 94] }
      });
      doc.save(filename + ".pdf");
    };

    // Components
    const InputField = ({ label, type="text", name, value, onChange, options, autoComplete, prefix }) => (
      <div className="flex flex-col gap-1 mb-4 w-full">
        <label className="text-sm font-medium text-slate-300">{label}</label>
        {type === 'textarea' ? (
          <textarea name={name} value={value || ''} onChange={onChange} className="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2 outline-none h-20 focus:border-brand-500"></textarea>
        ) : type === 'select' ? (
          <select name={name} value={value || ''} onChange={onChange} className="bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2 outline-none focus:border-brand-500">
             <option value="">Select Option</option>
             {options && options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        ) : (
          <div className="relative">
            {prefix && (
              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span className="text-slate-400 sm:text-sm text-xs font-semibold">{prefix}</span>
              </div>
            )}
            <input type={type} name={name} value={value || ''} onChange={onChange} autoComplete={autoComplete} className={`bg-slate-900 border border-slate-700 text-white text-sm rounded-lg p-2 outline-none focus:border-brand-500 w-full ${prefix ? 'pl-[2.2rem]' : ''}`} />
          </div>
        )}
      </div>
    );

    const Modal = ({ title, children, onClose }) => (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div className="bg-slate-900 border border-slate-700 rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto relative shadow-2xl">
          <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
          <h2 className="text-xl font-bold mb-6 text-brand-400 border-b border-slate-800 pb-2">{title}</h2>
          {children}
        </div>
      </div>
    );

    const AdminApp = () => {
      const [loggedIn, setLoggedIn] = useState(false);
      const [authMode, setAuthMode] = useState('login'); // 'login', 'forgot', 'reset'
      const [creds, setCreds] = useState({ email: '', pass: '' });
      const [error, setError] = useState('');
      const [authLoading, setAuthLoading] = useState(false);
      const [showBackupNotice, setShowBackupNotice] = useState(false);

      const [incomes, setIncomes] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('incomes');
      
      const [editIncome, setEditIncome] = useState(null);
      const [editExpense, setEditExpense] = useState(null);
      const [actionLoading, setActionLoading] = useState(false);
      const [expandedDonors, setExpandedDonors] = useState(new Set());

      const toggleDonorExpand = (name) => {
        const next = new Set(expandedDonors);
        if (next.has(name)) next.delete(name);
        else next.add(name);
        setExpandedDonors(next);
      };

      useEffect(() => {
        const hour = new Date().getHours();
        if (hour >= 22 || hour < 5) {
          setShowBackupNotice(true);
        }
      }, [loggedIn]);

      // Filters
      const [searchTerm, setSearchTerm] = useState('');
      const [filterDate, setFilterDate] = useState('');

      const formatCurrency = (amount) => {
        if(!amount) return "LKR. 0.00";
        return "LKR. " + parseFloat(amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      };

      const fetchData = async () => {
        setLoading(true);
        const [inc, exp] = await Promise.all([
          supabase.from('incomes').select('*').order('created_at', { ascending: false }),
          supabase.from('expenses').select('*').order('created_at', { ascending: false })
        ]);
        if (inc.data) setIncomes(inc.data);
        if (exp.data) setExpenses(exp.data);
        setLoading(false);
      };

      useEffect(() => {
        // Check current session
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (session?.user?.id === 'ce705686-2466-45a0-af35-23cba7651343') {
            setLoggedIn(true);
            fetchData();
          }
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          if (event === 'PASSWORD_RECOVERY') {
            setAuthMode('reset');
            setLoggedIn(false);
          } else if (event === 'SIGNED_IN') {
            // Check if we are currently in recovery mode (hash contains type=recovery)
            if (window.location.hash.includes('type=recovery') || window.location.search.includes('type=recovery')) {
              setAuthMode('reset');
              setLoggedIn(false);
            } else if (session?.user?.id === 'ce705686-2466-45a0-af35-23cba7651343') {
              setLoggedIn(true);
              fetchData();
            } else {
              supabase.auth.signOut();
              setError('Unauthorized: You do not have admin access.');
            }
          } else if (event === 'SIGNED_OUT') {
            setLoggedIn(false);
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthLoading(true); setError('');
        const { data, error } = await supabase.auth.signInWithPassword({
          email: creds.email,
          password: creds.pass
        });
        if (error) setError(error.message);
        setAuthLoading(false);
      };

      const handleForgotPassword = async (e) => {
        e.preventDefault();
        setAuthLoading(true); setError('');
        const { error } = await supabase.auth.resetPasswordForEmail(creds.email, {
          redirectTo: window.location.origin + window.location.pathname
        });
        if (error) setError(error.message);
        else {
           window.showToast("Password reset email sent!", "success");
           setAuthMode('login');
        }
        setAuthLoading(false);
      };

      const handleResetPassword = async (e) => {
        e.preventDefault();
        setAuthLoading(true); setError('');
        const { error } = await supabase.auth.updateUser({ password: creds.pass });
        if (error) setError(error.message);
        else {
           window.showToast("Password updated successfully! Please login with your new password.", "success");
           await supabase.auth.signOut();
           window.location.hash = '';
           setAuthMode('login');
           setLoggedIn(false);
           setCreds({...creds, pass: ''});
        }
        setAuthLoading(false);
      };

      const handleLogout = async () => {
        await supabase.auth.signOut();
      };

      const handleDeleteIncome = async (id) => {
        if (!window.confirm("Are you sure you want to delete this income record? / මේ වාර්තාව මකන්න අවශ්‍යද?")) return;
        setActionLoading(true);
        try {
          const { data, error } = await supabase.from('incomes').delete().eq('id', id).select();
          if (error) throw error;
          if (!data || data.length === 0) throw new Error("Access Denied: Record could not be deleted (Check Supabase RLS policies).");
          window.showToast("Record deleted successfully!", "success");
          fetchData();
        } catch (err) {
          window.showToast("Error deleting record: " + err.message, "error");
        } finally {
          setActionLoading(false);
        }
      };

      const handleDeleteExpense = async (id) => {
        if (!window.confirm("Are you sure you want to delete this expense record? / මේ වාර්තාව මකන්න අවශ්‍යද?")) return;
        setActionLoading(true);
        try {
          const { data, error } = await supabase.from('expenses').delete().eq('id', id).select();
          if (error) throw error;
          if (!data || data.length === 0) throw new Error("Access Denied: Record could not be deleted (Check Supabase RLS policies).");
          window.showToast("Record deleted successfully!", "success");
          fetchData();
        } catch (err) {
          window.showToast("Error deleting record: " + err.message, "error");
        } finally {
          setActionLoading(false);
        }
      };

      const handleToggleStatus = async (inc) => {
        setActionLoading(true);
        const newStatus = inc.status === 'Received Today' ? 'Promised' : 'Received Today';
        try {
          const { data, error } = await supabase.from('incomes').update({ status: newStatus }).eq('id', inc.id).select();
          if(error) throw error;
          if (!data || data.length === 0) throw new Error("Access Denied: Status could not be updated (Check Supabase RLS policies).");
          window.showToast(`Record marked as ${newStatus}!`, "success");
          fetchData();
        } catch(err) {
          window.showToast("Error updating status: " + err.message, "error");
        } finally {
          setActionLoading(false);
        }
      };

      const handleSaveIncome = async (e) => {
        e.preventDefault();
        setActionLoading(true);
        try {
          const { data, error } = await supabase.from('incomes').update(editIncome).eq('id', editIncome.id).select();
          if(error) throw error;
          if (!data || data.length === 0) throw new Error("Access Denied: Record could not be saved (Check Supabase RLS policies).");
          window.showToast("Record saved successfully!", "success");
          setEditIncome(null);
          fetchData();
        } catch(err) {
          window.showToast("Error saving record: " + err.message, "error");
        } finally {
          setActionLoading(false);
        }
      };

      const handleSaveExpense = async (e) => {
        e.preventDefault();
        setActionLoading(true);
        try {
          const { data, error } = await supabase.from('expenses').update(editExpense).eq('id', editExpense.id).select();
          if(error) throw error;
          if (!data || data.length === 0) throw new Error("Access Denied: Record could not be saved (Check Supabase RLS policies).");
          window.showToast("Record saved successfully!", "success");
          setEditExpense(null);
          fetchData();
        } catch(err) {
          window.showToast("Error saving record: " + err.message, "error");
        } finally {
          setActionLoading(false);
        }
      };

      const handleReceiptUpload = async (expenseId, file) => {
        if (!file) return;
        setActionLoading(true);
        try {
          const fileExt = file.name.split('.').pop();
          const fileName = `${Math.random()}.${fileExt}`;
          const filePath = `${fileName}`;

          const { error: uploadError } = await supabase.storage.from('receipts').upload(filePath, file);
          if (uploadError) throw uploadError;

          const { data } = supabase.storage.from('receipts').getPublicUrl(filePath);
          const receipt_url = data.publicUrl;

          const { error: updateError } = await supabase.from('expenses').update({ receipt_url }).eq('id', expenseId);
          if (updateError) throw updateError;

          window.showToast("Receipt uploaded successfully!", "success");
          fetchData();
        } catch (err) {
          window.showToast("Upload failed: " + err.message, "error");
        } finally {
          setActionLoading(false);
        }
      };

      // Filtering Logic
      const filteredIncomes = incomes.filter(inc => {
        if (activeTab === 'main_donors' && inc.donor_category !== 'Main Donor') return false;
        if (activeTab === 'regular_donors' && inc.donor_category !== 'Regular Donor') return false;
        if (activeTab === 'cash_incomes' && inc.donation_type !== 'Cash') return false;
        if (activeTab === 'goods_incomes' && inc.donation_type !== 'Goods') return false;
        if(filterDate && inc.date !== filterDate) return false;
        if(searchTerm) {
          const s = searchTerm.toLowerCase();
          return (inc.name?.toLowerCase().includes(s) || inc.id?.toString().includes(s) || inc.item_description?.toLowerCase().includes(s));
        }
        return true;
      });

      const filteredExpenses = expenses.filter(exp => {
        if(filterDate && exp.date !== filterDate) return false;
        if(searchTerm) {
          const s = searchTerm.toLowerCase();
          return (exp.reason?.toLowerCase().includes(s) || exp.withdrawer_name?.toLowerCase().includes(s));
        }
        return true;
      });

      const groupedMainDonors = React.useMemo(() => {
        if (activeTab !== 'main_donors') return [];
        const groups = {};
        filteredIncomes.forEach(inc => {
          const key = (inc.name || 'Unknown').trim().toLowerCase();
          if (!groups[key]) {
            groups[key] = {
              name: inc.name || 'Unknown',
              total: 0,
              records: [],
              key
            };
          }
          groups[key].total += Number(inc.amount || 0);
          groups[key].records.push(inc);
        });
        return Object.values(groups).sort((a, b) => b.total - a.total);
      }, [filteredIncomes, activeTab]);

      // Shares logic
      const totalCashIncome = incomes.filter(i => i.status === 'Received Today' && i.donation_type === 'Cash').reduce((sum, item) => sum + Number(item.amount || 0), 0);
      const totalExpense = expenses.reduce((sum, item) => sum + Number(item.amount_taken || 0), 0);
      const currentBalance = totalCashIncome - totalExpense;

      const mainContributors = incomes.filter(i => i.donation_type === 'Cash' && i.donor_category === 'Main Donor' && i.status === 'Received Today');
      const sponsorTotals = {};
      const sponsorNames = {};
      mainContributors.forEach(i => {
        const rawName = i.name?.trim() || 'Unknown';
        const key = rawName.toLowerCase().replace(/\s+/g, ' ');
        if(!sponsorTotals[key]) {
          sponsorTotals[key] = 0;
          sponsorNames[key] = rawName;
        }
        sponsorTotals[key] += Number(i.amount || 0);
      });
      const totalMainContribution = Object.values(sponsorTotals).reduce((sum, amt) => sum + amt, 0);
      
      const sponsorShares = Object.entries(sponsorTotals).map(([key, amount]) => {
        const name = sponsorNames[key];
        const percentage = totalMainContribution > 0 ? (amount / totalMainContribution) * 100 : 0;
        const shareAmount = (percentage / 100) * Math.max(0, currentBalance); // Only share positive balance
        return { name, amount, percentage, shareAmount };
      }).sort((a, b) => b.percentage - a.percentage);

      // Export Handlers
      const exportIncomesCSV = () => {
        const headers = ["ID", "Date", "Name", "Phone", "Type", "Status", "Amount", "Reported By", "Donor Category", "Item Description"];
        const rows = [headers, ...filteredIncomes.map(i => [
          i.id, i.date, i.name, i.phone_number || '-', i.donation_type, i.status, 
          i.amount || 0, i.reported_by || '-', i.donor_category || '-', i.item_description || '-'
        ])];
        exportToCSV("Admin_Incomes_Report", rows);
      };

      const exportIncomesPDF = () => {
        const headers = ["ID", "Date", "Name", "Type", "Status", "Amount/Details"];
        const rows = filteredIncomes.map(i => [
          i.id, i.date, i.name, i.donation_type, i.status, 
          i.donation_type === 'Cash' ? `LKR.${i.amount}` : `${i.item_description} (x${i.quantity})`
        ]);
        exportToPDF("Income Records (Admin Report)", headers, rows, "Admin_Incomes_Report");
      };

      const exportExpensesCSV = () => {
        const headers = ["ID", "Date", "Time", "Reason", "Withdrawer", "Amount"];
        const rows = [headers, ...filteredExpenses.map(e => [
          e.id, e.date, e.time, e.reason, e.withdrawer_name, e.amount_taken
        ])];
        exportToCSV("Admin_Expenses_Report", rows);
      };

      const exportExpensesPDF = () => {

        let sql = `-- Vesak System Database Backup\n-- Generated on: ${new Date().toLocaleString()}\n\n`;
        
        // Incomes SQL
        sql += `-- Table: incomes\n`;
        incomes.forEach(i => {
          const values = [
            i.id, i.date, i.name, i.phone_number, i.address, i.donation_type, 
            i.amount, i.donor_category, i.item_description, i.quantity, i.status, i.reported_by, i.description
          ].map(v => v === null || v === undefined ? 'NULL' : `'${String(v).replace(/'/g, "''")}'`);
          sql += `INSERT INTO incomes (id, date, name, phone_number, address, donation_type, amount, donor_category, item_description, quantity, status, reported_by, description) VALUES (${values.join(', ')});\n`;
        });

        sql += `\n-- Table: expenses\n`;
        // Expenses SQL
        expenses.forEach(e => {
          const values = [
            e.id, e.reason, e.withdrawer_name, e.date, e.time, e.amount_taken, e.receipt_url

        });

        const blob = new Blob([sql], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `Vesak_Backup_${new Date().toISOString().split('T')[0]}.txt`;

                      <td className="p-4 hidden md:table-cell" data-label="Type"><span className={`px-2 py-1 rounded text-[10px] ${inc.donation_type === 'Cash' ? 'bg-brand-500/10 text-brand-400' : 'bg-purple-500/10 text-purple-400'}`}>{inc.donation_type}</span></td>
                      <td className="p-4 max-w-[150px] truncate text-slate-300 hidden lg:table-cell" data-label="Details">
                        {inc.donation_type === 'Cash' ? inc.donor_category : `${inc.item_description} (x${inc.quantity})`}
                      </td>
                      <td className="p-4 text-brand-400 font-bold text-xs sm:text-sm" data-label="Amount">{inc.amount ? `Rs.${inc.amount}` : '-'}</td>
                      <td className="p-4 hidden sm:table-cell" data-label="Status">
                        <span className={`px-2 py-1 rounded text-[10px] ${inc.status === 'Received Today' ? 'bg-brand-500/20 text-brand-400' : 'bg-yellow-500/20 text-yellow-400'}`}>
                          {inc.status}
                        </span>
                      </td>
                      <td className="p-4 text-right whitespace-nowrap" data-label="Actions">
                        <button onClick={() => handleToggleStatus(inc)} disabled={actionLoading} className={`p-1.5 rounded-md mr-1.5 transition text-[10px] font-bold disabled:opacity-50 ${inc.status === 'Received Today' ? 'bg-yellow-500/20 text-yellow-500' : 'bg-brand-500/20 text-brand-400'}`} title="Toggle Status">
                          {inc.status === 'Received Today' ? 'Pledge' : 'Receive'}
                        </button>
                        <button onClick={() => setEditIncome(inc)} disabled={actionLoading} className="p-1.5 bg-blue-500/20 text-blue-400 rounded-md mr-1.5 hover:bg-blue-500/30 transition text-[10px] font-bold disabled:opacity-50">Edit</button>
                        <button onClick={() => handleDeleteIncome(inc.id)} disabled={actionLoading} className="p-1.5 bg-red-500/20 text-red-400 rounded-md hover:bg-red-500/30 transition text-[10px] font-bold disabled:opacity-50">Del</button>
                      </td>
                    </tr>
                  ))}
                  
                  {activeTab === 'expenses' && filteredExpenses.map(exp => (
                    <tr key={exp.id} className="border-b border-slate-800/50 hover:bg-slate-800/40 transition">
                      <td className="p-4 font-mono text-xs text-slate-500 hidden md:table-cell" data-label="ID">#{exp.id}</td>
                      <td className="p-4 text-slate-300 hidden sm:table-cell text-xs" data-label="Date">{exp.date}</td>
                      <td className="p-4 font-medium text-white hidden sm:table-cell text-xs" data-label="Withdrawer">{exp.withdrawer_name}</td>
                      <td className="p-4 max-w-[200px] truncate text-slate-300 text-xs sm:text-sm" data-label="Reason">{exp.reason}</td>
                      <td className="p-4 text-red-400 font-bold text-xs sm:text-sm" data-label="Amount">Rs.{exp.amount_taken}</td>
                      <td className="p-4" data-label="Receipt">
                        {exp.receipt_url ? (
                          <button onClick={() => window.open(exp.receipt_url, '_blank')} className="text-brand-400 hover:text-brand-300 transition" title="View Receipt">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                          </button>
                        ) : (
                          <span className="text-slate-600" title="No Receipt">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                          </span>
                        )}
                      </td>
                      <td className="p-4 text-right whitespace-nowrap" data-label="Actions">
                        <button onClick={() => setEditExpense(exp)} disabled={actionLoading} className="p-1.5 bg-blue-500/20 text-blue-400 rounded-md mr-1.5 hover:bg-blue-500/30 transition text-[10px] font-bold disabled:opacity-50">Edit</button>
                        <button onClick={() => handleDeleteExpense(exp.id)} disabled={actionLoading} className="p-1.5 bg-red-500/20 text-red-400 rounded-md hover:bg-red-500/30 transition text-[10px] font-bold disabled:opacity-50">Del</button>
                      </td>
                    </tr>
                  ))}

                  {activeTab === 'shares' && (
                    <>
                      <tr className="bg-slate-900/50">
                        <td colSpan="4" className="p-4 border-b border-slate-800">
                          <div className="flex justify-between items-center bg-blue-500/10 p-4 rounded-lg border border-blue-500/20">
                            <div className="flex flex-col">
                              <span className="text-sm text-slate-300">Current Balance / ඉතිරි මුදල</span>
                              <span className="text-2xl font-bold text-blue-400">Rs. {currentBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                            </div>
                            <div className="flex flex-col text-right">
                              <span className="text-sm text-slate-300">Total Main Contributions</span>
                              <span className="text-lg font-semibold text-brand-400">{formatCurrency(totalMainContribution)}</span>
                            </div>
                          </div>
                        </td>
                      </tr>
                      {sponsorShares.map((s, idx) => (
                        <tr key={idx} className="border-b border-slate-800/50 hover:bg-slate-800/40 transition">
                          <td className="p-4 font-medium text-white" data-label="Donor Name">{s.name}</td>
                          <td className="p-4 text-slate-300" data-label="Contribution">{formatCurrency(s.amount)}</td>
                          <td className="p-4" data-label="Percentage">
                            <div className="flex items-center gap-2 justify-end sm:justify-start">
                              <span className="text-brand-400 font-semibold">{s.percentage.toFixed(2)}%</span>
                              <div className="w-24 bg-slate-800 rounded-full h-1.5 hidden sm:block">
                                <div className="bg-brand-500 h-1.5 rounded-full" style={{width: `${s.percentage}%`}}></div>
                              </div>
                            </div>
                          </td>
                          <td className="p-4 text-blue-400 font-bold text-lg" data-label="Share Amount">{formatCurrency(s.shareAmount)}</td>
                        </tr>
                      ))}
                    </>
                  )}

                  {((activeTab === 'incomes' || activeTab === 'cash_incomes' || activeTab === 'goods_incomes' || activeTab === 'regular_donors') && filteredIncomes.length === 0) && (
                    <tr><td colSpan="8" className="p-8 text-center text-slate-500">No income records found.</td></tr>
                  )}
                  {(activeTab === 'main_donors' && groupedMainDonors.length === 0) && (
                    <tr><td colSpan="4" className="p-8 text-center text-slate-500">No main donors found.</td></tr>
                  )}
                  {(activeTab === 'expenses' && filteredExpenses.length === 0) && (
                    <tr><td colSpan="6" className="p-8 text-center text-slate-500">No expense records found.</td></tr>
                  )}
                  {(activeTab === 'shares' && sponsorShares.length === 0) && (
                    <tr><td colSpan="4" className="p-8 text-center text-slate-500">No main contributors found.</td></tr>
                  )}
                </tbody>
              </table>
            )}
          </div>

          {/* Edit Income Modal */}
          {editIncome && (
            <Modal title={`Edit Income Record (#${editIncome.id})`} onClose={() => setEditIncome(null)}>
              <form onSubmit={handleSaveIncome}>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                  <InputField label="Name" value={editIncome.name} onChange={e => setEditIncome({...editIncome, name: e.target.value})} />
                  <InputField label="Phone Number" value={editIncome.phone_number} onChange={e => setEditIncome({...editIncome, phone_number: e.target.value})} />
                  <InputField label="Date" type="date" value={editIncome.date} onChange={e => setEditIncome({...editIncome, date: e.target.value})} />
                  <InputField label="Donation Type" type="select" options={['Cash', 'Goods']} value={editIncome.donation_type} onChange={e => setEditIncome({...editIncome, donation_type: e.target.value})} />
                  
                  {editIncome.donation_type === 'Cash' ? (
                    <>
                      <InputField label="Amount (Rs)" type="number" value={editIncome.amount} onChange={e => setEditIncome({...editIncome, amount: e.target.value})} prefix="Rs." />
                      <InputField label="Donor Category" type="select" options={['Main Donor', 'Regular Donor']} value={editIncome.donor_category} onChange={e => setEditIncome({...editIncome, donor_category: e.target.value})} />
                    </>
                  ) : (
                    <>
                      <InputField label="Item Description" value={editIncome.item_description} onChange={e => setEditIncome({...editIncome, item_description: e.target.value})} />
                      <InputField label="Quantity" type="number" value={editIncome.quantity} onChange={e => setEditIncome({...editIncome, quantity: e.target.value})} />
                    </>
                  )}
                  
                  <InputField label="Status" type="select" options={['Received Today', 'Promised']} value={editIncome.status} onChange={e => setEditIncome({...editIncome, status: e.target.value})} />
                  <InputField label="Reported By" value={editIncome.reported_by} onChange={e => setEditIncome({...editIncome, reported_by: e.target.value})} />
                  
                  <div className="md:col-span-2">
                    <InputField label="Description / Notes" type="textarea" value={editIncome.description} onChange={e => setEditIncome({...editIncome, description: e.target.value})} />
                  </div>
                </div>
                <div className="flex gap-3 mt-4">
                  <button type="button" onClick={() => setEditIncome(null)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-white font-bold transition">Cancel</button>
                  <button type="submit" disabled={actionLoading} className="flex-1 bg-brand-600 hover:bg-brand-500 text-white font-bold py-3 rounded-lg transition disabled:opacity-50">Save Changes</button>
                </div>
              </form>
            </Modal>
          )}

          {/* Edit Expense Modal */}
          {editExpense && (
            <Modal title={`Edit Expense Record (#${editExpense.id})`} onClose={() => setEditExpense(null)}>
              <form onSubmit={handleSaveExpense}>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                  <div className="md:col-span-2">
                    <InputField label="Reason" value={editExpense.reason} onChange={e => setEditExpense({...editExpense, reason: e.target.value})} />
                  </div>
                  <InputField label="Withdrawer Name" value={editExpense.withdrawer_name} onChange={e => setEditExpense({...editExpense, withdrawer_name: e.target.value})} />
                  <InputField label="Amount Taken" type="number" value={editExpense.amount_taken} onChange={e => setEditExpense({...editExpense, amount_taken: e.target.value})} prefix="Rs." />
                  <InputField label="Date" type="date" value={editExpense.date} onChange={e => setEditExpense({...editExpense, date: e.target.value})} />
                  <InputField label="Time" type="time" value={editExpense.time} onChange={e => setEditExpense({...editExpense, time: e.target.value})} />
                  <div className="md:col-span-2 mt-2">
                    <label className="text-sm font-medium text-slate-300 block mb-2">Receipt / රිසිට් පත</label>
                    <div className="flex items-center gap-4">
                      {editExpense.receipt_url ? (
                        <div className="relative group">
                          <img src={editExpense.receipt_url} className="w-20 h-20 object-cover rounded-lg border border-slate-700" />
                          <button type="button" onClick={() => window.open(editExpense.receipt_url, '_blank')} className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center rounded-lg">
                            <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                          </button>
                        </div>
                      ) : (
                        <div className="w-20 h-20 rounded-lg border border-dashed border-slate-700 flex items-center justify-center text-slate-500">
                          <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </div>
                      )}
                      <label className="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg p-4 cursor-pointer transition flex flex-col items-center justify-center gap-1 text-slate-300">
                        <input type="file" accept="image/*" className="hidden" onChange={(e) => handleReceiptUpload(editExpense.id, e.target.files[0])} />
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                        <span className="text-xs font-bold">{editExpense.receipt_url ? 'Change Receipt' : 'Upload Receipt'}</span>
                      </label>
                    </div>
                  </div>
                </div>
                <div className="flex gap-3 mt-6">
                  <button type="button" onClick={() => setEditExpense(null)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-white font-bold transition">Cancel</button>
                  <button type="submit" disabled={actionLoading} className="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-lg transition disabled:opacity-50">Save Changes</button>
                </div>
              </form>
            </Modal>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp />);
  </script>
</body>
</html>
