    // --- CRYPTO UTILS ---
    const hashPassword = async (password) => {
      const msgUint8 = new TextEncoder().encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // --- WEBAUTHN / FACE ID UTILS ---
    const generateRandomBuffer = (length) => {
      const array = new Uint8Array(length);
      crypto.getRandomValues(array);
      return array;
    };

    const registerFaceId = async (user) => {
      try {
        if (!window.PublicKeyCredential) {
          throw new Error("WebAuthn / Face ID is not supported in this browser.");
        }
        if (window.location.protocol === 'file:') {
          throw new Error("Face ID cannot be set up on 'file://'. You must run the app using a local server (localhost) or an HTTPS domain.");
        }
        
        const challenge = generateRandomBuffer(32);
        const userId = generateRandomBuffer(16);
        
        const rpConfig = { name: "Vesak Finance System" };
        if (window.location.hostname) {
          rpConfig.id = window.location.hostname;
        }
        
        const publicKeyCredentialCreationOptions = {
          challenge,
          rp: rpConfig,
          user: {
            id: userId,
            name: user.username,
            displayName: user.username,
          },
          pubKeyCredParams: [{alg: -7, type: "public-key"}, {alg: -257, type: "public-key"}],
          authenticatorSelection: {
            authenticatorAttachment: "platform", // Forces the OS to use Face ID / Fingerprint / Screen Lock
            userVerification: "preferred"
          },
          timeout: 60000,
          attestation: "none"
        };
        
        const credential = await navigator.credentials.create({
          publicKey: publicKeyCredentialCreationOptions
        });
        
        const rawIdBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(credential.rawId)));
        
        const { error } = await supabase.from('app_users').update({ passkey_id: rawIdBase64 }).eq('id', user.id);
        if (error) throw error;
        
        return rawIdBase64;
      } catch (err) {
        console.error(err);
        throw err;
      }
    };

    const authenticateWithFaceId = async (passkeyId) => {
      try {
        if (!window.PublicKeyCredential) {
          throw new Error("WebAuthn / Face ID is not supported.");
        }
        if (window.location.protocol === 'file:') {
          throw new Error("Face ID cannot be used on 'file://'. You must run the app using a local server (localhost) or an HTTPS domain.");
        }
        
        const challenge = generateRandomBuffer(32);
        const binaryString = atob(passkeyId);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        
        const publicKeyCredentialRequestOptions = {
          challenge,
          allowCredentials: [{
            id: bytes,
            type: 'public-key',
            transports: ['internal'] // Specifies internal platform authenticators
          }],
          userVerification: "preferred",
          timeout: 60000
        };
        
        const assertion = await navigator.credentials.get({
          publicKey: publicKeyCredentialRequestOptions
        });
        
        return assertion !== null;
      } catch (err) {
        console.error(err);
        throw err;
      }
    };

    const exportToCSV = (filename, rows) => {

        return `"${cell.toString().replace(/"/g, '""')}"`;
      }).join(",")).join("\n");
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", filename + ".csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

        // Inner Dashed Border

        ctx.lineWidth = 2;
        ctx.strokeRect(32, 47, width - 64, height - 79);

        ctx.font = 'bold 26px sans-serif';
        ctx.letterSpacing = '2px';
        ctx.fillText('OFFICIAL DONATION RECEIPT', width/2, 155);

        ctx.fillStyle = '#94a3b8';
        ctx.font = '22px sans-serif';
        ctx.letterSpacing = '0px';
        ctx.fillText('මහා වෙසක් කූඩු ව්‍යාපෘතිය', width/2, 190);

        ctx.moveTo(100, 230);
        ctx.lineTo(width-100, 230);
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Details Section (Tabular alignment)
        let currentY = 310;
        const rowSpacing = 65;
        const leftColX = width / 2 - 20;
        const rightColX = width / 2 + 20;

        const drawRow = (label, value, isHighlight = false) => {
          // Label
          ctx.textAlign = 'right';
          ctx.fillStyle = '#64748b';
          ctx.font = '22px sans-serif';
          ctx.fillText(label, leftColX, currentY);
          
          // Value
          ctx.textAlign = 'left';
          ctx.fillStyle = isHighlight ? '#22c55e' : '#e2e8f0';
          
          // --- FIX: Dynamic Font Sizing to prevent overflowing ---
          let displayValue = String(value || '-');

             ctx.font = isHighlight ? 'bold 16px sans-serif' : 'bold 15px sans-serif';
          } else if(displayValue.length > 20) {
             ctx.font = isHighlight ? 'bold 20px sans-serif' : 'bold 18px sans-serif';
          } else {
             ctx.font = isHighlight ? 'bold 24px sans-serif' : 'bold 22px sans-serif';
          }
          
          ctx.fillText(displayValue, rightColX, currentY);
          currentY += rowSpacing;

        ctx.fillText('0716155666 - ඉසර දිල්නුක  |  0710846810 - ඉමේශ් නිල්හාන්', width/2, currentY);
        
        currentY += 25;
        ctx.fillStyle = '#475569';
        ctx.font = '16px sans-serif';
        ctx.fillText('isaradilnuka2005@gmail.com', width/2, currentY);

        // Final Thank you
        currentY += 60;
        ctx.fillStyle = '#22c55e';
        ctx.font = 'italic 22px sans-serif';
        ctx.fillText('Thank you for your generous contribution!', width/2, currentY);
        ctx.font = '20px sans-serif';
        ctx.fillText('ඔබගේ වටිනා පරිත්‍යාගයට බොහෝ පින්.', width/2, currentY + 30);

        ctx.drawImage(img, width - 130, 60, 80, 80);

    const NumberCounter = ({ value, prefix = "LKR." }) => {
      const [count, setCount] = React.useState(0);
      
      React.useEffect(() => {
        let start = 0;
        const end = parseFloat(value);
        if(isNaN(end)) {
           setCount(value);
           return;
        }
        const duration = 1500;
        const increment = end / (duration / 16);
        const timer = setInterval(() => {
          start += increment;
          if (start >= end) {
            clearInterval(timer);
            setCount(end);
          } else {
            setCount(start);
          }
        }, 16);
        return () => clearInterval(timer);
      }, [value]);
      
      return (
        <span className="inline-flex items-baseline gap-1.5">
          <span className="text-base font-semibold opacity-60 tracking-normal">{prefix}</span>
          <span>{formatNumber(count)}</span>
        </span>

                <div className="glass-card border border-white/5 rounded-2xl px-2 py-3 min-w-[60px] sm:min-w-[75px] shadow-xl flex flex-col items-center bg-slate-950/40 relative group/unit overflow-hidden">
                  <div className="absolute inset-0 bg-gradient-to-b from-white/[0.02] to-transparent pointer-events-none"></div>
                  <span className={`text-xl sm:text-2xl font-bold font-mono tracking-tight ${unit.highlight ? 'text-amber-500' : 'text-brand-400'}`}>{unit.val}</span>
                  <span className="text-[7px] sm:text-[8px] text-slate-500 uppercase tracking-widest mt-1.5 font-bold">{unit.label}</span>
                </div>
                {i < 3 && <div className="text-xl sm:text-2xl font-bold text-slate-800 self-center hidden sm:block">:</div>}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    function ReporterBadge({ name, users, showFullName = false }) {
      if (!name) return null;
      const user = users?.find(u => {
         const firstWord = u.username.split(' ')[0].toLowerCase();
         return name.toLowerCase().includes(firstWord) || u.username.toLowerCase() === name.toLowerCase();
      });
      const displayName = showFullName ? name : name.split(' ')[0];
      return (
        <div className="flex items-center gap-1.5">
          {user?.avatar_url ? (
            <div className="w-5 h-5 rounded-full overflow-hidden border border-slate-600 shrink-0 shadow-sm">
              <img src={user.avatar_url} alt="" className="w-full h-full object-cover" />
            </div>
          ) : (
            <div className="w-5 h-5 rounded-full bg-slate-800 flex items-center justify-center border border-slate-600 shrink-0 shadow-sm text-slate-400">
              <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
          )}
          <span className={`font-medium text-slate-300 ${showFullName ? 'text-sm' : 'text-xs whitespace-nowrap'}`}>{displayName}</span>
        </div>
      );
    }

    function ProfileView({ currentUser, incomes, expenses, userTotalContribution, balanceToPay, users }) {
      const [viewCategory, setViewCategory] = useState(null);
      const [profileData, setProfileData] = useState({ phone_number: currentUser?.phone_number || '', address: currentUser?.address || '' });
      const [savingProfile, setSavingProfile] = useState(false);
      const [isEditingProfile, setIsEditingProfile] = useState(false);

      const [sessions, setSessions] = useState([]);
      const [loadingSessions, setLoadingSessions] = useState(true);

      useEffect(() => {
        if(!currentUser) return;
        fetchSessions();
      }, [currentUser]);

      const fetchSessions = async () => {
         setLoadingSessions(true);
         try {
           const { data, error } = await supabase.from('user_sessions').select('*').eq('user_id', currentUser.id).order('last_active', { ascending: false });
           if (!error && data) setSessions(data);
         } catch(e) {}
         setLoadingSessions(false);
      };

      const handleRemoveSession = async (sessionId) => {
         if (!confirm('Are you sure you want to log out this device? / මෙම උපාංගය ඉවත් කිරීමට අවශ්‍යද?')) return;
         try {
            await supabase.from('user_sessions').delete().eq('id', sessionId);
            fetchSessions();
         } catch(e) { alert("Error: " + e.message); }
      };

      const handleClearAllSessions = async () => {
         if (!confirm('Are you sure you want to log out ALL devices? / සියලුම උපාංග ඉවත් කිරීමට අවශ්‍යද?')) return;
         try {
            await supabase.from('user_sessions').delete().eq('user_id', currentUser.id);
            fetchSessions();
         } catch(e) { alert("Error: " + e.message); }
      };

      const handleSaveProfile = async (e) => {
        e.preventDefault();
        setSavingProfile(true);
        try {
          const { error } = await supabase.from('app_users').update({ phone_number: profileData.phone_number, address: profileData.address }).eq('id', currentUser.id);
          if (error) throw error;
          const updatedUser = { ...currentUser, ...profileData };
          localStorage.setItem('vesak_current_user', JSON.stringify(updatedUser));
          alert("Profile updated successfully!");
          setIsEditingProfile(false);
        } catch (err) {
          alert("Error: " + err.message);
        } finally {
          setSavingProfile(false);
        }
      };

      const handleAvatarUpload = async (e) => {
         const file = e.target.files[0];
         if(!file) return;
         try {
           const reader = new FileReader();
           reader.readAsDataURL(file);
           reader.onload = () => {
             const img = new Image();
             img.src = reader.result;
             img.onload = async () => {
                const canvas = document.createElement('canvas');
                const MAX_SIZE = 400;
                let width = img.width, height = img.height;
                if(width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                else if(height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const base64 = canvas.toDataURL('image/jpeg', 0.5);
                
                const { error } = await supabase.from('app_users').update({ avatar_url: base64 }).eq('id', currentUser.id);
                if(error) throw error;
                
                const updated = { ...currentUser, avatar_url: base64 };
                localStorage.setItem('vesak_current_user', JSON.stringify(updated));
                alert("Profile photo updated! Please refresh the page to see changes.\nපින්තූරය යාවත්කාලීන විය! වෙනස්කම් බැලීමට පිටුව රීෆ්‍රෙෂ් කරන්න.");
                window.location.reload();
             };
           };
         } catch(err) {
           alert("Failed to upload avatar: " + err.message);
         }
      };

      const userIncomes = incomes.filter(i => {
         if (!currentUser || !i.name) return false;
         const firstWord = currentUser.username.split(' ')[0].toLowerCase();
         return i.name.toLowerCase().includes(firstWord) && i.status === 'Received Today';
      });

      const myIncomes = incomes.filter(i => i.reported_by === currentUser.username && i.status === 'Received Today' && i.donation_type === 'Cash');
      const myExpenses = expenses.filter(e => {
        if (e.reported_by === currentUser.username) return true;
        if (!currentUser || !e.withdrawer_name) return false;
        const firstWord = currentUser.username.split(' ')[0].toLowerCase();
        const withdrawerLower = e.withdrawer_name.toLowerCase().replace(/\s+/g, ' ');
        return withdrawerLower.includes(firstWord);
      });
      const myPledges = incomes.filter(i => i.reported_by === currentUser.username && i.status === 'Promised');
      const myGoods = incomes.filter(i => i.reported_by === currentUser.username && i.donation_type === 'Goods');

      return (
        <div className="space-y-6">

          </h2>

          <div className="glass p-6 rounded-2xl border border-slate-800">
            <div className="flex items-center gap-4 mb-6">

                 <img src={currentUser?.avatar_url || 'logo.png'} alt="Avatar" className="w-full h-full object-cover group-hover:opacity-50 transition" />
                 <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition bg-black/40">
                   <svg className="w-6 h-6 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                 </div>
                 <input type="file" accept="image/*" className="hidden" onChange={handleAvatarUpload} />
               </label>
               <div>
                 <h3 className="text-xl font-bold text-white">{currentUser?.username}</h3>
                 <p className="text-sm text-brand-400 font-medium tracking-wide">{currentUser?.role === 'admin' ? 'System Administrator' : 'Main Sponsor'}</p>
               </div>
            </div>

            <div className="flex flex-col sm:flex-row gap-4 mb-8">
              <div className="glass-card p-5 rounded-2xl border border-slate-700/30 flex-1 relative overflow-hidden group">
                <div className="absolute top-0 right-0 w-16 h-16 bg-brand-500/5 blur-xl rounded-full"></div>
                <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">Total Contribution</p>
                <p className="text-2xl font-bold text-brand-400 drop-shadow-[0_0_10px_rgba(34,197,94,0.3)]">Rs. {Math.round(userTotalContribution).toLocaleString()}</p>
              </div>
              <div className="glass-card p-5 rounded-2xl border border-slate-700/30 flex-1 relative overflow-hidden group">
                <div className="absolute top-0 right-0 w-16 h-16 bg-blue-500/5 blur-xl rounded-full"></div>
                <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">Payment Status</p>
                {balanceToPay > 0 ? (
                  <p className="text-lg font-bold text-yellow-400 drop-shadow-[0_0_10px_rgba(234,179,8,0.3)]">Pending: Rs. {Math.round(balanceToPay).toLocaleString()}</p>
                ) : balanceToPay < 0 ? (
                  <p className="text-lg font-bold text-amber-500 drop-shadow-[0_0_10px_rgba(245,158,11,0.3)]">Top Contributor 🏆</p>
                ) : (
                  <p className="text-lg font-bold text-brand-400 drop-shadow-[0_0_10px_rgba(34,197,94,0.3)]">Target Reached 🎉</p>
                )}
              </div>
            </div>

            <div className="glass p-6 rounded-2xl border border-slate-800 mb-6">
               <h3 className="text-lg font-semibold text-white mb-4">Security Settings</h3>
               <div className="flex items-center justify-between p-4 bg-slate-900/50 rounded-xl border border-slate-700/50">
                  <div className="flex items-center gap-3">
                     <div className="w-10 h-10 rounded-full bg-brand-500/10 text-brand-400 flex items-center justify-center">
                       <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" /></svg>
                     </div>
                     <div className="flex flex-col">
                        <span className="font-semibold text-white">Face ID / Passkey</span>
                        <span className="text-[10px] text-slate-400">{currentUser.passkey_id ? 'Setup Completed' : 'Not Setup Yet'}</span>
                     </div>
                  </div>
                  <button onClick={async () => {
                     try {
                       const newPasskeyId = await registerFaceId(currentUser);
                       const updatedUser = {...currentUser, passkey_id: newPasskeyId};
                       localStorage.setItem('vesak_current_user', JSON.stringify(updatedUser));
                       window.location.reload();
                     } catch(e) {
                       alert("Setup failed: " + e.message);
                     }
                  }} className="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg text-xs font-semibold text-white transition whitespace-nowrap">
                     {currentUser.passkey_id ? 'Update / වෙනස් කරන්න' : 'Set Up / සකසන්න'}
                  </button>
               </div>
            </div>

            <div className="glass p-6 rounded-2xl border border-slate-800 mb-6">
               <div className="flex justify-between items-center mb-4">
                 <h3 className="text-lg font-semibold text-white">Active Devices / සක්‍රීය උපාංග</h3>
                 {sessions.length > 1 && (
                   <button onClick={handleClearAllSessions} className="text-[10px] bg-red-500/10 text-red-400 px-3 py-1 rounded-full border border-red-500/20 hover:bg-red-500/20 transition-colors uppercase font-bold tracking-widest">Clear All</button>
                 )}
               </div>
               
               {loadingSessions ? (
                 <div className="text-center py-4 text-slate-500 text-sm">Loading devices...</div>
               ) : sessions.length === 0 ? (
                 <div className="text-center py-4 text-slate-500 text-sm">No other devices found.</div>
               ) : (
                 <div className="space-y-3">
                   {sessions.map(session => {
                     const isCurrent = session.session_token === localStorage.getItem('vesak_session_token');
                     return (
                       <div key={session.id} className={`flex items-center justify-between p-4 rounded-xl border transition group ${isCurrent ? 'bg-brand-500/5 border-brand-500/30 shadow-[0_0_15px_rgba(34,197,94,0.05)]' : 'bg-slate-900/50 border-slate-700/50 hover:border-slate-600'}`}>
                         <div className="flex items-center gap-3">
                           <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${isCurrent ? 'bg-brand-500/20 text-brand-400' : 'bg-slate-800 text-slate-400'}`}>
                             <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                           </div>
                           <div className="flex flex-col">
                             <div className="flex items-center gap-2">
                               <span className="font-semibold text-white text-sm">{session.device_name || 'Unknown Device'}</span>

                             </div>
                             <span className="text-[10px] text-slate-400 mt-0.5">IP: {session.ip_address || 'Unknown'} • {session.location || 'Unknown Location'}</span>
                             <span className="text-[9px] text-slate-500 mt-0.5">Last active: {new Date(session.last_active).toLocaleString()}</span>
                           </div>
                         </div>
                         {!isCurrent && (
                           <button onClick={() => handleRemoveSession(session.id)} className="p-2 text-slate-500 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition" title="Log out this device">
                             <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                           </button>
                         )}
                       </div>
                     );
                   })}
                 </div>
               )}
            </div>

            <div className="glass p-6 rounded-2xl border border-slate-800 mb-6 relative">
               <h3 className="text-lg font-semibold text-white mb-4">Contact Details / සම්බන්ධ වීමේ විස්තර</h3>
               {!isEditingProfile && (
                 <button onClick={() => setIsEditingProfile(true)} className="absolute top-6 right-6 p-2 text-brand-400 hover:bg-brand-500/10 rounded-lg transition" title="Edit Profile">
                   <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                 </button>
               )}

               {!isEditingProfile ? (
                 <div className="space-y-3 mt-2">
                   <div className="flex items-start gap-4 bg-slate-900/40 p-4 rounded-xl border border-slate-800 hover:border-slate-700 transition group">
                     <div className="w-10 h-10 rounded-full bg-brand-500/10 text-brand-400 flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform">
                       <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                     </div>
                     <div className="flex flex-col justify-center min-h-[40px]">
                       <p className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-0.5">Phone Number</p>
                       <p className="text-sm font-medium text-white">{currentUser?.phone_number || <span className="text-slate-500 italic text-xs">Not provided</span>}</p>
                     </div>
                   </div>
                   <div className="flex items-start gap-4 bg-slate-900/40 p-4 rounded-xl border border-slate-800 hover:border-slate-700 transition group">
                     <div className="w-10 h-10 rounded-full bg-blue-500/10 text-blue-400 flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform">
                       <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                     </div>
                     <div className="flex flex-col justify-center min-h-[40px]">
                       <p className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-0.5">Address</p>
                       <p className="text-sm font-medium text-white whitespace-pre-wrap leading-relaxed">{currentUser?.address || <span className="text-slate-500 italic text-xs">Not provided</span>}</p>
                     </div>
                   </div>
                 </div>
               ) : (
                 <form onSubmit={handleSaveProfile} className="grid grid-cols-1 gap-x-4">
                   <div className="mb-4">
                     <label className="text-sm font-medium text-slate-300">Phone Number</label>
                     <input type="text" value={profileData.phone_number} onChange={e => setProfileData({...profileData, phone_number: e.target.value})} className="mt-1 block w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2 text-sm focus:border-brand-500 outline-none" />
                   </div>
                   <div className="mb-4">
                     <label className="text-sm font-medium text-slate-300">Address</label>
                     <textarea value={profileData.address} onChange={e => setProfileData({...profileData, address: e.target.value})} className="mt-1 block w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-2 text-sm focus:border-brand-500 outline-none h-20"></textarea>
                   </div>
                   <div className="flex justify-end gap-3">
                     <button type="button" onClick={() => { setIsEditingProfile(false); setProfileData({ phone_number: currentUser?.phone_number || '', address: currentUser?.address || '' }); }} className="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-sm font-semibold transition">
                       Cancel
                     </button>
                     <button type="submit" disabled={savingProfile} className="px-6 py-2 bg-brand-600 hover:bg-brand-500 text-white rounded-lg text-sm font-semibold transition disabled:opacity-50">
                       {savingProfile ? 'Saving...' : 'Save Details / යාවත්කාලීන කරන්න'}
                     </button>
                   </div>
                 </form>
               )}
            </div>

            <h3 className="text-lg font-semibold text-white mb-4 mt-8">My Recorded Data / මා වාර්තා කල දත්ත</h3>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
               <button onClick={() => setViewCategory('income')} className="bg-slate-900/80 hover:bg-slate-800 p-4 rounded-xl border border-slate-700/50 flex flex-col items-center justify-center gap-2 transition">
                 <svg className="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                 <span className="text-xs font-semibold text-brand-400">Cash Incomes</span>
                 <span className="text-[10px] text-slate-400 bg-slate-800 px-2 rounded-full">{myIncomes.length}</span>

               <button onClick={() => setViewCategory('expense')} className="bg-slate-900/80 hover:bg-slate-800 p-4 rounded-xl border border-slate-700/50 flex flex-col items-center justify-center gap-2 transition">
                 <svg className="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 12H4" /></svg>

    function ExpenseList({ expenses, onRefresh, users }) {
      const [searchTerm, setSearchTerm] = useState('');
      const [sortBy, setSortBy] = useState('date-desc');
      const [filterDate, setFilterDate] = useState('');
      const [uploadingId, setUploadingId] = useState(null);

      const handleReceiptUpload = async (e, recordId) => {
        const file = e.target.files[0];
        if (!file) return;

        // Compress image client side
        setUploadingId(recordId);
        
        try {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = async () => {
             const img = new Image();
             img.src = reader.result;
             img.onload = async () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) {
                   height *= MAX_WIDTH / width;
                   width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);

                try {
                   const { error: fbErr } = await supabase.from('expenses').update({ receipt_url: compressedBase64 }).eq('id', recordId);
                   if (fbErr) throw fbErr;
                   alert("Receipt uploaded successfully! / බිල්පත සාර්ථකව උඩුගත කරන ලදි.");
                   if(onRefresh) onRefresh();

                   alert("Error: To save receipts, please manually add a 'receipt_url' (Type: text) column to your 'expenses' table in Supabase!\nSupabase හි 'expenses' table එකට 'receipt_url' ලෙස අලුත් text column එකක් එකතු කරන්න!");
                } finally {
                   setUploadingId(null);
                }
             };
          };

          alert('Failed to process image');

        }

      const [otherWithdrawers, setOtherWithdrawers] = useState(['']);

        reason: '',
        date: new Date().toISOString().split('T')[0],
        time: new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }),
        amount_taken: ''
      });
      const [receiptFile, setReceiptFile] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

      const handleFormSubmit = async (e) => {
        e.preventDefault();
        if (step < totalSteps) {
            setStep(step + 1);
            return;
        }

        setLoading(true); setError('');
        
        try {
          let receipt_url = null;
          
          if (receiptFile) {
            const fileExt = receiptFile.name.split('.').pop();
            const fileName = `${Math.random()}.${fileExt}`;
            const filePath = `${fileName}`;

            const { error: uploadError } = await supabase.storage.from('receipts').upload(filePath, receiptFile);
            if (uploadError) throw uploadError;

            const { data } = supabase.storage.from('receipts').getPublicUrl(filePath);
            receipt_url = data.publicUrl;
          }

          let allWithdrawers = [...selectedMainWithdrawers];
          if (showOtherWithdrawer) {
             allWithdrawers = [...allWithdrawers, ...otherWithdrawers.filter(n => n.trim() !== '')];

             throw new Error("Please select or type at least one withdrawer.");

          const finalWithdrawerName = allWithdrawers.join(', ');

            reason: formData.reason,
            date: formData.date,
            time: formData.time,
            amount_taken: parseFloat(formData.amount_taken),
            withdrawer_name: finalWithdrawerName,
            receipt_url,
            reported_by: currentUser?.username
          };

          const { error: dbErr } = await supabase.from('expenses').insert([payload]);
          if (dbErr) throw dbErr;
          
          if (typeof supabase.functions !== 'undefined') {

               body: { record: { ...payload, reported_by: currentUser?.username }, type: 'INSERT' }
             }).catch(e => console.error("FCM invoke error:", e));

            reason: '',
            date: new Date().toISOString().split('T')[0],

            amount_taken: ''
          });
          setSelectedMainWithdrawers([]);
          setShowOtherWithdrawer(false);

    function LoginScreen({ onLogin, onShowBalance, showNotification }) {
      const [users, setUsers] = useState([]);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const [view, setView] = useState('login'); // 'login', 'change_password', 'forgot_password'
      const [newPassword, setNewPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [currentUserData, setCurrentUserData] = useState(null);
      const [usePasswordFallback, setUsePasswordFallback] = useState(false);

      useEffect(() => {
        fetchUsers();
      }, []);

      const fetchUsers = async () => {
        try {
          const { data, error } = await supabase.from('app_users').select('*');
          if (error) {
            if (error.message.includes('relation "public.app_users" does not exist')) {
              setError('Database setup required. Please ask Admin to run the SQL script.');
            } else {
              setError(error.message);
            }
          } else {
            setUsers(data || []);
          }
        } catch (err) {
          setError(err.message);
        }
      };

      const validatePassword = (pass) => {
        const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}$/;
        return regex.test(pass);
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!username || !password) return setError("Please fill all fields");
        setLoading(true);
        setError('');
        
        try {
          const user = users.find(u => u.username === username);
          if (!user) {
            setError('User not found');
            setLoading(false);
            return;
          }
          
          const hashedInput = await hashPassword(password);
          if (user.password_hash !== password && user.password_hash !== hashedInput) {
            setError('Incorrect password');
            setLoading(false);
            return;
          }
          
          if (user.is_temp_password) {
            setCurrentUserData(user);
            setView('change_password');
            setLoading(false);
            return;
          }
          
          onLogin(user);
        } catch (err) {
          setError('Login failed: ' + err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleFaceIdLogin = async () => {
        const user = users.find(u => u.username === username);
        if (!user || !user.passkey_id) return;
        setLoading(true);
        setError('');
        try {
          const success = await authenticateWithFaceId(user.passkey_id);
          if (success) {
            onLogin(user);
          } else {
            setError("Face ID verification failed.");
            setUsePasswordFallback(true);
          }
        } catch(err) {
          setError("Face ID error: " + err.message);
          setUsePasswordFallback(true);
        } finally {
          setLoading(false);
        }
      };

      const handleChangePassword = async (e) => {
        e.preventDefault();
        if (!validatePassword(newPassword)) {
          setError('Password must be 8-20 characters long, include uppercase, lowercase, numbers, and symbols.');
          return;
        }
        if (newPassword !== confirmPassword) {
          setError('Passwords do not match');
          return;
        }
        setLoading(true);
        try {
          const hashedNew = await hashPassword(newPassword);
          const { error: updateErr } = await supabase.from('app_users').update({
            password_hash: hashedNew,
            is_temp_password: false,
            reset_requested: false
          }).eq('id', currentUserData.id);
          
          if (updateErr) throw updateErr;
          
          showNotification({ type: 'success', title: 'Password Changed', sTitle: 'මුරපදය වෙනස් කරන ලදි' });
          onLogin({ ...currentUserData, password_hash: hashedNew, is_temp_password: false });
        } catch(err) {
          setError(err.message);
          setLoading(false);
        }
      };

      const handleForgotPassword = async (e) => {
        e.preventDefault();
        if (!username) return setError('Please select a username first');
        setLoading(true);
        try {
          const { error: reqErr } = await supabase.from('app_users').update({
            reset_requested: true
          }).eq('username', username);
          if (reqErr) throw reqErr;
          showNotification({ type: 'success', title: 'Request Sent', sTitle: 'ඇඩ්මින් වෙත යවන ලදි' });
          setView('login');
        } catch(err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 relative">
          <div className="absolute inset-0 bg-brand-500/5 blur-[100px] pointer-events-none"></div>
          <div className="glass rounded-2xl p-8 max-w-sm w-full border border-slate-800 text-center relative z-10 animate-fade-in">
             <div className="w-16 h-16 rounded-2xl bg-[#0f172a] shadow-[0_0_15px_rgba(34,197,94,0.2)] border border-white/10 flex items-center justify-center mx-auto mb-6">
               <img src="logo.png" alt="Logo" className="w-[80%] h-[80%] object-contain" />
             </div>

             <p className="text-sm text-slate-400 mb-6">පද්ධතියට ඇතුල් වන්න</p>
             
             {error && <div className="bg-red-500/20 text-red-300 p-2 text-xs rounded mb-4">{error}</div>}

             {view === 'login' && (
               <form onSubmit={handleLogin} className="space-y-4">
                 <div className="flex flex-col gap-4 mb-6">
                   <div className="flex justify-center gap-4">
                     {users.filter(u => !u.username.toLowerCase().includes('isara') && !u.username.toLowerCase().includes('imesh')).map(u => (
                       <div key={u.id} onClick={() => setUsername(u.username)} className={`flex flex-col items-center cursor-pointer transition-all duration-300 ${username === u.username ? 'scale-110 opacity-100' : 'opacity-50 hover:opacity-100 hover:scale-105'}`}>
                          <div className={`w-14 h-14 rounded-full overflow-hidden border-2 ${username === u.username ? 'border-brand-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]' : 'border-slate-700'}`}>
                            <img src={u.avatar_url || 'logo.png'} alt={u.username} className="w-full h-full object-cover" />

                          <span className="text-[10px] mt-1 text-slate-300 font-medium">{u.username.split(' ')[0]}</span>

                   </div>
                   <div className="flex justify-center gap-4">
                     {users.filter(u => u.username.toLowerCase().includes('isara') || u.username.toLowerCase().includes('imesh')).map(u => (
                       <div key={u.id} onClick={() => setUsername(u.username)} className={`flex flex-col items-center cursor-pointer transition-all duration-300 ${username === u.username ? 'scale-110 opacity-100' : 'opacity-50 hover:opacity-100 hover:scale-105'}`}>
                          <div className={`w-14 h-14 rounded-full overflow-hidden border-2 ${username === u.username ? 'border-brand-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]' : 'border-slate-700'}`}>
                            <img src={u.avatar_url || 'logo.png'} alt={u.username} className="w-full h-full object-cover" />

                          <span className="text-[10px] mt-1 text-slate-300 font-medium">{u.username.split(' ')[0]}</span>
                       </div>
                     ))}
                   </div>
                 </div>
                 
                 {username && (() => {
                   const selectedUser = users.find(u => u.username === username);
                   const hasPasskey = selectedUser && selectedUser.passkey_id;

                   if (hasPasskey && !usePasswordFallback) {
                     return (
                       <div className="animate-fade-in space-y-4">
                         <button type="button" onClick={handleFaceIdLogin} disabled={loading} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 rounded-xl transition border border-slate-600 disabled:opacity-50">
                           <svg className="w-5 h-5 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" /></svg>
                           {loading ? 'Verifying...' : 'Login with Face ID / Fingerprint'}
                         </button>
                         <button type="button" onClick={() => setUsePasswordFallback(true)} className="text-xs text-slate-400 hover:text-slate-300 w-full">
                           Use Password Instead
                         </button>
                       </div>
                     );
                   }

                   return (
                     <div className="animate-fade-in space-y-4">
                       <input type="password" placeholder={`Password for ${username.split(' ')[0]}`} value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-3 outline-none focus:border-brand-500" required />
                       <button type="submit" disabled={loading} className="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3 rounded-xl transition shadow-[0_0_15px_rgba(34,197,94,0.3)] disabled:opacity-50">
                         {loading ? 'Logging in...' : 'Login'}
                       </button>
                     </div>
                   );
                 })()}
                 <div className="flex justify-between mt-4">
                   <button type="button" onClick={() => setView('forgot_password')} className="text-xs text-brand-400 hover:text-brand-300">Forgot Password?</button>
                   <button type="button" onClick={onShowBalance} className="text-xs text-slate-400 hover:text-slate-300 border-b border-slate-600 pb-0.5">View Current Balance</button>
                 </div>
               </form>
             )}

             {view === 'change_password' && (
               <form onSubmit={handleChangePassword} className="space-y-4 text-left">
                 <p className="text-xs text-brand-400 mb-2 text-center">Please set a new secure password.</p>
                 <input type="password" placeholder="New Password" value={newPassword} onChange={e => setNewPassword(e.target.value)} className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-3 outline-none focus:border-brand-500 text-sm" required />
                 <input type="password" placeholder="Confirm Password" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-3 outline-none focus:border-brand-500 text-sm" required />
                 <ul className="text-[10px] text-slate-400 pl-4 list-disc space-y-0.5">
                   <li>8-20 characters long</li>
                   <li>One uppercase & one lowercase letter</li>
                   <li>One number & one symbol (@$!%*?&)</li>
                 </ul>
                 <button type="submit" disabled={loading} className="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-3 rounded-xl transition shadow-[0_0_15px_rgba(34,197,94,0.3)] disabled:opacity-50 mt-2">
                   {loading ? 'Saving...' : 'Change Password & Login'}
                 </button>
               </form>
             )}

             {view === 'forgot_password' && (
               <form onSubmit={handleForgotPassword} className="space-y-4 text-left">
                 <p className="text-sm text-slate-300 text-center">Select your account to request a password reset.</p>
                 <select value={username} onChange={e => setUsername(e.target.value)} className="w-full bg-slate-900 border border-slate-700 text-white rounded-lg p-3 outline-none focus:border-brand-500" required>
                   <option value="">Select Username</option>
                   {users.map(u => <option key={u.id} value={u.username}>{u.username}</option>)}
                 </select>
                 <button type="submit" disabled={loading} className="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-semibold py-3 rounded-xl transition shadow-[0_0_15px_rgba(234,179,8,0.3)] disabled:opacity-50">
                   {loading ? 'Requesting...' : 'Request Reset'}
                 </button>
                 <button type="button" onClick={() => setView('login')} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 rounded-xl transition border border-slate-700">Back to Login</button>
               </form>
             )}
          </div>
        </div>
      );
    }

    // --- MAIN APP COMPONENT ---
    function App() {
      const [currentUser, setCurrentUser] = useState(() => {
        const savedUser = localStorage.getItem('vesak_current_user');
        return savedUser ? JSON.parse(savedUser) : null;
      });
      const [showBalanceOnly, setShowBalanceOnly] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [showFaceIdSetup, setShowFaceIdSetup] = useState(false);

      useEffect(() => {
        if (currentUser) {
          localStorage.setItem('vesak_current_user', JSON.stringify(currentUser));
          if (typeof window.requestFCMPermission === 'function') {
            window.requestFCMPermission(currentUser.id);
          }
          registerSession(currentUser.id);
        } else {
          localStorage.removeItem('vesak_current_user');
        }
      }, [currentUser]);

      const registerSession = async (userId) => {
        try {
          let ip = "Unknown IP", loc = "Unknown Location";
          try {
             const res = await fetch('https://get.geojs.io/v1/ip/geo.json');
             const data = await res.json();
             if (data.ip) {
                ip = data.ip;
                loc = `${data.city || ''}, ${data.country || ''}`.replace(/^, | , $/g, '').trim();
             }
          } catch(e) {
             console.log("GeoJS failed, trying fallback...");
             try {
               const fallbackRes = await fetch('https://api.db-ip.com/v2/free/self');
               const fallbackData = await fallbackRes.json();
               if (fallbackData.ipAddress) {
                  ip = fallbackData.ipAddress;
                  loc = `${fallbackData.city || ''}, ${fallbackData.countryName || ''}`.replace(/^, | , $/g, '').trim();
               }
             } catch(fallbackErr) {
               console.error("IP fetch failed", fallbackErr);
             }
          }
          
          let sessionToken = localStorage.getItem('vesak_session_token');
          if (!sessionToken) {
             sessionToken = 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
             localStorage.setItem('vesak_session_token', sessionToken);
          }
          
          const ua = navigator.userAgent;
          let browser = "Unknown Browser";
          if (ua.includes("Firefox/")) browser = "Firefox";
          else if (ua.includes("Edg/")) browser = "Edge";
          else if (ua.includes("Chrome/")) browser = "Chrome";
          else if (ua.includes("Safari/") && !ua.includes("Chrome")) browser = "Safari";
          
          let os = "Unknown OS";
          if (ua.includes("Win")) os = "Windows";
          else if (ua.includes("Mac")) os = "MacOS";
          else if (ua.includes("Linux")) os = "Linux";
          else if (ua.includes("Android")) os = "Android";
          else if (ua.includes("like Mac")) os = "iOS";
          
          const deviceName = `${os} - ${browser}`;

          await supabase.from('user_sessions').upsert({
             session_token: sessionToken,
             user_id: userId,
             device_name: deviceName,
             location: loc,
             ip_address: ip,
             last_active: new Date().toISOString(),
             is_online: true
          }, { onConflict: 'session_token' });
        } catch(err) { console.error('Session Error:', err); }
      };

      const [users, setUsers] = useState([]);
      const [incomes, setIncomes] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [loading, setLoading] = useState(true);
      const [notification, setNotification] = useState(null);

      const showNotification = (data) => {
        setNotification(data);
        setTimeout(() => setNotification(null), 7000);
      };

      useEffect(() => {
        const handleFCM = (e) => {
           showNotification({
             title: e.detail.title,
             sTitle: 'New Notification',
             details: [
               { label: 'Message', value: e.detail.body }
             ]
           });
        };
        window.addEventListener('fcm-message', handleFCM);
        return () => window.removeEventListener('fcm-message', handleFCM);
      }, []);

      const fetchData = async () => {
        setLoading(true);
        try {
          const [incRes, expRes, usersRes] = await Promise.all([
            supabase.from('incomes').select('*').order('created_at', { ascending: false }),
            supabase.from('expenses').select('*').order('created_at', { ascending: false }),
            supabase.from('app_users').select('*')
          ]);
          
          if(!usersRes.error) setUsers(usersRes.data || []);

          if(incRes.error) console.error(incRes.error);
          else {
            const incData = incRes.data || [];
            setIncomes(incData);
            
            // Check for confetti condition!
            const totalCash = incData.filter(i => i.status === 'Received Today' && i.donation_type === 'Cash').reduce((sum, item) => sum + Number(item.amount || 0), 0);
            if(totalCash >= 80000 && activeTab === 'dashboard') {
              setTimeout(() => {
                window.confetti({
                  particleCount: 150,
                  spread: 80,
                  origin: { y: 0.1 },
                  colors: ['#22c55e', '#eab308', '#3b82f6', '#ec4899']
                });
              }, 800);
            }
          }

          if(expRes.error) console.error(expRes.error);
          else setExpenses(expRes.data || []);
          
        } catch(err) {
          console.error("Fetch error:", err);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
      }, []);

      // Swipe Gestures for Mobile Navigation
      const handleTouchStart = (e) => {
        // Prevent swipe on tables and interactive scroll areas
        if (e.target.closest('.overflow-x-auto') || e.target.closest('table') || e.target.closest('input') || e.target.closest('textarea')) return;
        window.touchStartX = e.changedTouches[0].screenX;
        window.touchStartY = e.changedTouches[0].screenY;
      };

      const handleTouchEnd = (e) => {
        if (window.touchStartX === undefined || window.touchStartX === null) return;
        
        const touchEndX = e.changedTouches[0].screenX;
        const touchEndY = e.changedTouches[0].screenY;
        
        const deltaX = touchEndX - window.touchStartX;
        const deltaY = touchEndY - window.touchStartY;
        
        // Thresholds: min 70px horizontal, and horizontal must be 2x vertical
        if (Math.abs(deltaX) > 70 && Math.abs(deltaX) > Math.abs(deltaY) * 2) {
          const MAIN_TABS = ['dashboard', 'income-page', 'expense-page', 'pledges'];
          
          // Determine current base tab (handling sub-pages)
          let baseTab = activeTab;
          if (['income-list', 'goods-list'].includes(activeTab)) baseTab = 'income-page';
          if (activeTab === 'expense-list') baseTab = 'expense-page';
          
          const currentIndex = MAIN_TABS.indexOf(baseTab);
          
          if (currentIndex !== -1) {
            if (deltaX < 0 && currentIndex < MAIN_TABS.length - 1) {
              // Swipe Left -> Go Right
              setActiveTab(MAIN_TABS[currentIndex + 1]);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (deltaX > 0 && currentIndex > 0) {
              // Swipe Right -> Go Left
              setActiveTab(MAIN_TABS[currentIndex - 1]);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }
          }
        }
        window.touchStartX = null;
        window.touchStartY = null;
      };

      // Desktop Top Navigation Button
      const NavigationButton = ({ id, label, sLabel, icon }) => (
        <button

          </div>
          {id === 'pledges' && incomes.filter(i => i.status === 'Promised').length > 0 && (
            <span className="ml-2 self-center px-2 py-0.5 rounded-full bg-yellow-500/20 text-yellow-500 text-[10px] font-extrabold border border-yellow-500/30 shadow-[0_0_10px_rgba(234,179,8,0.3)] animate-pulse">
              {incomes.filter(i => i.status === 'Promised').length}

        </button>
      );

      // Mobile Bottom Fixed Navigation Button
      const MobileNavButton = ({ id, label, sLabel, icon }) => (

            activeTab === id

          }`}
        >
          <div className={`mb-1 transition-all duration-300 ${activeTab === id ? '-translate-y-0.5 scale-110 drop-shadow-[0_0_10px_rgba(34,197,94,0.6)]' : 'group-hover:scale-110'}`}>
            {icon}
          </div>
          <span className={`text-[10px] uppercase tracking-wider leading-none transition-all duration-300 ${activeTab === id ? 'font-extrabold' : 'font-medium'}`}>{label}</span>
          <span className={`text-[8px] mt-1 transition-all duration-300 ${activeTab === id ? 'text-brand-300 opacity-100' : 'font-normal opacity-60'}`}>{sLabel}</span>
          
          {id === 'pledges' && incomes.filter(i => i.status === 'Promised').length > 0 && (
            <span className="absolute top-1.5 right-3 sm:right-6 w-2.5 h-2.5 rounded-full bg-yellow-500 border border-slate-900 shadow-[0_0_10px_rgba(234,179,8,1)] animate-ping" style={{animationDuration: '2s'}}></span>
          )}
          {id === 'pledges' && incomes.filter(i => i.status === 'Promised').length > 0 && (
            <span className="absolute top-1.5 right-3 sm:right-6 w-2.5 h-2.5 rounded-full bg-yellow-500 border border-slate-900 shadow-[0_0_5px_rgba(234,179,8,0.8)]"></span>
          )}
        </button>
      );

      if (!currentUser) {
        if (showBalanceOnly) {
           const totalInc = incomes.filter(i => i.status === 'Received Today' && i.donation_type === 'Cash').reduce((sum, item) => sum + Number(item.amount || 0), 0);
           const totalExp = expenses.reduce((sum, item) => sum + Number(item.amount_taken || 0), 0);
           const currentBalance = totalInc - totalExp;
           return (
             <div className="min-h-screen flex items-center justify-center p-4 relative">
               <div className="absolute inset-0 bg-brand-500/5 blur-[100px] pointer-events-none"></div>
               <div className="glass rounded-2xl p-8 max-w-sm w-full border border-slate-800 text-center relative z-10 animate-fade-in">
                 <div className="w-16 h-16 rounded-full bg-brand-500/20 text-brand-400 flex items-center justify-center mx-auto mb-6">
                   <IconWallet />
                 </div>
                 <h2 className="text-xl font-bold text-white mb-2">Current Balance</h2>
                 <p className="text-sm text-slate-400 mb-6">දැනට ඉතිරි මුදල</p>
                 <div className="text-4xl font-bold text-brand-400 mb-8 neon-text">{formatCurrency(currentBalance)}</div>
                 <button onClick={() => setShowBalanceOnly(false)} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-semibold py-3 px-4 rounded-xl transition border border-slate-700">
                   Back to Login
                 </button>
               </div>
             </div>
           );
        }
        const handleLoginSuccess = (user) => {
           setCurrentUser(user);
           if (!user.passkey_id) {
             setShowFaceIdSetup(true);
           }
        };

        return <LoginScreen onLogin={handleLoginSuccess} onShowBalance={() => setShowBalanceOnly(true)} showNotification={showNotification} />;
      }

      let targetAmount = 10000;
      if (currentUser?.username?.includes('Chamuditha')) {
         targetAmount = 6000;
      }
      
      const userTotalContribution = incomes
        .filter(i => {
           if (!currentUser || !i.name) return false;
           const firstWord = currentUser.username.split(' ')[0].toLowerCase();
           return i.name.toLowerCase().includes(firstWord) && i.donation_type === 'Cash' && i.status === 'Received Today';
        })
        .reduce((sum, item) => sum + Number(item.amount || 0), 0);
        
      const balanceToPay = targetAmount - userTotalContribution;

      return (
        <div className="flex flex-col min-h-screen pb-20 md:pb-0 relative">
          <NotificationToast show={!!notification} data={notification} onClose={() => setNotification(null)} />
          
          {showFaceIdSetup && (

              <div className="glass p-8 rounded-2xl max-w-sm w-full text-center border border-brand-500/30 shadow-[0_0_40px_rgba(34,197,94,0.15)]">
                <div className="w-20 h-20 mx-auto bg-brand-500/20 text-brand-400 rounded-full flex items-center justify-center mb-6">
                  <svg className="w-10 h-10 drop-shadow-[0_0_10px_rgba(34,197,94,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" /></svg>
                </div>
                <h3 className="text-2xl font-bold text-white mb-2 tracking-tight">Set Up Face ID</h3>
                <p className="text-sm text-slate-400 mb-8 leading-relaxed">ඊලඟ වතාවේ මුරපදය නොමැතිව පහසුවෙන් ලොග් වීමට Face ID හෝ Fingerprint සකසන්න.</p>
                <button onClick={async () => {
                   try {
                     const newPasskeyId = await registerFaceId(currentUser);
                     const updatedUser = {...currentUser, passkey_id: newPasskeyId};
                     setCurrentUser(updatedUser);
                     localStorage.setItem('vesak_current_user', JSON.stringify(updatedUser));
                     setShowFaceIdSetup(false);
                     showNotification({ type: 'success', title: 'Face ID Setup Successful!', sTitle: 'සාර්ථකව සැකසුනි.' });
                   } catch(e) {
                     alert("Setup Failed: " + e.message);
                   }
                }} className="w-full bg-brand-600 hover:bg-brand-500 text-white font-bold py-3.5 rounded-xl mb-4 transition shadow-[0_0_15px_rgba(34,197,94,0.3)]">
                  Set Up Now / සකසන්න
                </button>
                <button onClick={() => setShowFaceIdSetup(false)} className="text-slate-400 hover:text-slate-200 text-xs font-medium transition border-b border-transparent hover:border-slate-500 pb-0.5">

                </button>
              </div>
            </div>
          )}
          
          {/* Top Navigation with Safe Area (env) for Notch / Dynamic Island */}
          <header className="glass sticky top-0 z-50 border-b border-slate-800 shadow-[0_10px_30px_rgba(0,0,0,0.5)] backdrop-saturate-150" style={{ paddingTop: 'max(env(safe-area-inset-top), 0.75rem)' }}>
            <div className="absolute inset-0 bg-gradient-to-b from-brand-500/5 to-transparent pointer-events-none"></div>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 pb-2">
              <div className="flex items-center justify-between h-20 md:h-24">
                <div className="flex items-center gap-3 md:gap-5">
                  <div className="w-12 h-12 md:w-16 md:h-16 rounded-2xl bg-slate-900/80 backdrop-blur-md flex items-center justify-center shrink-0 shadow-[0_0_20px_rgba(34,197,94,0.3)] border border-brand-500/20 overflow-hidden relative group cursor-pointer">
                    <div className="absolute inset-0 bg-brand-500/20 animate-pulse pointer-events-none"></div>

                  </div>
                </div>
                
                {currentUser && (

                    <div className="text-xs font-medium text-slate-300 flex items-center gap-2">
                      <div className="flex items-center gap-2 bg-slate-800/50 pr-3 rounded-full border border-slate-700/50 hidden sm:flex">

                             <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>

                      </div>
                      <button onClick={() => setCurrentUser(null)} className="text-[10px] bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/20 transition px-2 py-1 rounded flex items-center gap-1">
                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        Logout
                      </button>
                    </div>
                    
                    <div className="hidden sm:flex mt-1 bg-slate-900/80 border border-slate-700/50 px-3 py-1.5 rounded-lg flex-col items-end min-w-[140px] shadow-md">
                       <div className="flex justify-between w-full text-[10px] text-slate-400 mb-0.5 gap-3">
                         <span>Your Contribution:</span>
                         <span className="font-bold text-white">Rs. {Math.round(userTotalContribution).toLocaleString()}</span>
                       </div>
                       {balanceToPay > 0 ? (
                         <div className="text-[9px] text-yellow-400 font-medium animate-pulse mt-0.5">
                           කරුණාකර ඉතිරි මුදල ලබා දෙන්න (Rs. {Math.round(balanceToPay).toLocaleString()})
                         </div>
                       ) : balanceToPay < 0 ? (
                         <div className="flex items-center gap-1 mt-0.5 bg-gradient-to-r from-amber-500/20 to-yellow-500/20 px-2 py-0.5 rounded border border-amber-500/30">
                           <span className="text-[12px]">🏆</span>
                           <span className="text-[9px] text-amber-400 font-bold tracking-wide">Top Contributor! Thank You!</span>
                         </div>
                       ) : (
                         <div className="text-[9px] text-brand-400 font-bold mt-0.5">
                           Target Reached! Thank you! 🎉
                         </div>
                       )}
                    </div>
                  </div>
                )}
              </div>
            </div>
            
            {/* Desktop Navigation */}
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-4 hidden md:block">
              <nav className="flex flex-wrap gap-2">
                <NavigationButton id="dashboard" label="Dashboard" sLabel="පාලක පුවරුව" icon={<IconDashboard />} />
                <NavigationButton id="income-page" label="Income" sLabel="ආදායම්" icon={<IconIncome />} />
                <NavigationButton id="expense-page" label="Expense" sLabel="වියදම්" icon={<IconExpense />} />
                <NavigationButton id="pledges" label="Pending Pledges" sLabel="පොරොන්දු" icon={<IconPledges />} />
              </nav>
            </div>
          </header>

          {/* Main Area with Safe Area Bottom Padding to prevent overlapping with bottom bar */}
          <main 
            className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 w-full z-10 relative" 
            style={{ paddingBottom: 'calc(max(env(safe-area-inset-bottom), 1rem) + 6rem)' }}
            onTouchStart={handleTouchStart}
            onTouchEnd={handleTouchEnd}
          >
            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-brand-500/10 blur-[120px] rounded-full pointer-events-none"></div>
            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 rounded-full bg-blue-500/10 blur-[120px] pointer-events-none"></div>
            
            <div className="relative z-10 animate-fade-in">
                {activeTab === 'profile' && <ProfileView currentUser={currentUser} incomes={incomes} expenses={expenses} userTotalContribution={userTotalContribution} balanceToPay={balanceToPay} users={users} />}
                {activeTab === 'dashboard' && <DashboardView incomes={incomes} expenses={expenses} setActiveTab={setActiveTab} currentUser={currentUser} userTotalContribution={userTotalContribution} balanceToPay={balanceToPay} users={users} />}
                
                {activeTab === 'income-page' && (
                  <div className="space-y-8 animate-fade-in">
                    <IncomeForm currentUser={currentUser} users={users} onComplete={(data) => {
                      fetchData();
                      if(data) showNotification({
                        type: 'success',
                        title: 'Donation Added successfully!',
                        sTitle: 'ආධාර වාර්තාව සාර්ථකව එකතු කරන ලදි!',
                        details: [
                          { label: 'Name (නම)', value: data.name },
                          { label: 'Type (වර්ගය)', value: data.donation_type === 'Cash' ? 'Cash (මුදල්)' : 'Goods (ද්‍රව්‍ය)' },
                          { label: 'Amount/Qty (ප්‍රමාණය)', value: data.donation_type === 'Cash' ? formatCurrency(data.amount) : `${data.item_description} (x${data.quantity})` }
                        ]
                      });
                    }} />
                  </div>
                )}

                {activeTab === 'income-list' && (
                  <div className="space-y-8 animate-fade-in">
                    <IncomeList incomes={incomes} users={users} />
                  </div>
                )}
                
                {activeTab === 'goods-list' && (
                  <div className="space-y-8 animate-fade-in">
                    <GoodsList incomes={incomes} users={users} />
                  </div>
                )}
                
                {activeTab === 'expense-page' && (
                  <div className="space-y-8 animate-fade-in">
                    <ExpenseForm currentUser={currentUser} users={users} onComplete={(data) => {
                      fetchData();
                      if(data) showNotification({
                        type: 'blue',
                        title: 'Expense Recorded successfully!',
                        sTitle: 'වියදම් වාර්තාව සාර්ථකව එකතු කරන ලදි!',
                        details: [
                          { label: 'Reason (හේතුව)', value: data.reason },
                          { label: 'Amount (මුදල)', value: formatCurrency(data.amount_taken) },
                          { label: 'Withdrawer (ලබාගත්තේ)', value: data.withdrawer_name }
                        ]
                      });
                    }} />
                  </div>
                )}

                {activeTab === 'expense-list' && (
                  <div className="space-y-8 animate-fade-in">
                    <ExpenseList expenses={expenses} onRefresh={fetchData} users={users} />
                  </div>
                )}

                {activeTab === 'pledges' && <PromisedList incomes={incomes} onRefresh={fetchData} showNotification={showNotification} users={users} />}
            </div>
            
            {currentUser?.role === 'admin' && (
              <div className="text-center mt-12 mb-8 pb-24 md:pb-8 flex justify-center animate-fade-in delay-200">
                 <a href="admin.html" className="group relative px-6 py-3 bg-slate-900/40 hover:bg-brand-500/10 rounded-2xl border border-white/5 hover:border-brand-500/30 transition-all duration-500 flex items-center gap-3 overflow-hidden shadow-xl shadow-black/20">
                   <div className="absolute inset-0 bg-gradient-to-r from-brand-500/0 via-brand-500/5 to-brand-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
                   <div className="w-8 h-8 rounded-xl bg-brand-500/10 flex items-center justify-center text-brand-400 group-hover:scale-110 transition-transform">
                     <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                   </div>
                   <span className="text-xs font-black text-slate-400 group-hover:text-white uppercase tracking-widest transition-colors">System Admin Dashboard</span>
                   <svg className="w-3.5 h-3.5 text-slate-600 group-hover:text-brand-400 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                 </a>
              </div>
            )}
          </main>

          {/* Mobile Footer Navigation with Bottom Safe Area for iPhone Home Indicator */}
          <div className="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-slate-800/80 z-50 flex justify-between px-2 pt-2 bg-slate-950/90 backdrop-blur-2xl backdrop-saturate-150 shadow-[0_-10px_40px_rgba(0,0,0,0.6)]" style={{ paddingBottom: 'max(env(safe-area-inset-bottom), 1rem)' }}>
            <MobileNavButton id="dashboard" label="Dashboard" sLabel="ආරම්භය" icon={<IconDashboard />} />
            <MobileNavButton id="income-page" label="Income" sLabel="ආදායම්" icon={<IconIncome />} />
            <MobileNavButton id="expense-page" label="Expense" sLabel="වියදම්" icon={<IconExpense />} />
            <div id="btn-profile" className="hidden" onClick={() => setActiveTab('profile')}></div>
            <MobileNavButton id="profile" label="Profile" sLabel="ගිණුම" icon={
              currentUser?.avatar_url 
              ? <div className={`w-5 h-5 rounded-full overflow-hidden border ${activeTab === 'profile' ? 'border-brand-400' : 'border-slate-500'}`}><img src={currentUser.avatar_url} alt="Profile" className="w-full h-full object-cover" /></div>
              : <IconProfile />
            } />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(registration => {
          console.log('ServiceWorker registration successful');
        }).catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
