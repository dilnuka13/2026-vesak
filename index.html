    /* Glassmorphism utilities */

    // --- UTILS ---
    const formatCurrency = (amount) => {
      if(!amount) return "LKR. 0.00";
      return "LKR. " + parseFloat(amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };
    
    const formatDate = (dateString) => {
      if(!dateString) return '';
      const d = new Date(dateString);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    };

    const exportToCSV = (filename, rows) => {
      const csvContent = "\uFEFF" + rows.map(r => r.map(cell => {
        if (cell === null || cell === undefined) return '""';
        return `"${cell.toString().replace(/"/g, '""')}"`;
      }).join(",")).join("\n");
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", filename + ".csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    const exportToPDF = (title, columns, dataRows, filename) => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(16);
      doc.text(title, 14, 22);
      
      doc.autoTable({
        startY: 30,
        head: [columns],
        body: dataRows,
        theme: 'grid',
        styles: { font: 'helvetica', fontSize: 9 },
        headStyles: { fillColor: [34, 197, 94] }
      });
      doc.save(filename + ".pdf");
    };

    const REPORTERS = ["Nethusha Kaushika", "Isara Dilnuka", "Imesh Nilhan", "Kanchana Didulanga", "Chamuditha lakshan", "Other"];

    const downloadReceipt = (donation) => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const width = 800;
      const height = 1150;
      canvas.width = width;
      canvas.height = height;

      // Full Background
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, width, height);

      const drawContent = () => {
        // Aesthetic Top Bar
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(0, 0, width, 15);

        // Outer Double Border Effect
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 6;
        ctx.strokeRect(20, 35, width - 40, height - 55);

        // Inner Dashed Border
        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 2;
        ctx.strokeRect(32, 47, width - 64, height - 79);
        ctx.setLineDash([]); // Reset line dash

        // Watermark Logo
        ctx.globalAlpha = 0.04;
        const logoSize = 500;
        ctx.drawImage(img, (width - logoSize) / 2, (height - logoSize) / 2, logoSize, logoSize);
        ctx.globalAlpha = 1.0;

        // Header Section
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 42px sans-serif';
        ctx.fillText('VESAK LANTERN 2026', width/2, 110);
        
        ctx.fillStyle = '#22c55e';
        ctx.font = 'bold 26px sans-serif';
        ctx.letterSpacing = '2px';
        ctx.fillText('OFFICIAL DONATION RECEIPT', width/2, 155);

        ctx.fillStyle = '#94a3b8';
        ctx.font = '22px sans-serif';
        ctx.letterSpacing = '0px';
        ctx.fillText('මහා වෙසක් කූඩු ව්‍යාපෘතිය', width/2, 190);

        // Divider Line
        ctx.beginPath();
        ctx.moveTo(100, 230);
        ctx.lineTo(width-100, 230);
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Details Section (Tabular alignment)
        let currentY = 310;
        const rowSpacing = 65;
        const leftColX = width / 2 - 20;
        const rightColX = width / 2 + 20;

        const drawRow = (label, value, isHighlight = false) => {
          // Label
          ctx.textAlign = 'right';
          ctx.fillStyle = '#64748b';
          ctx.font = '22px sans-serif';
          ctx.fillText(label, leftColX, currentY);
          
          // Value
          ctx.textAlign = 'left';
          ctx.fillStyle = isHighlight ? '#22c55e' : '#e2e8f0';
          
          // --- FIX: Dynamic Font Sizing to prevent overflowing ---
          let displayValue = String(value || '-');
          if(displayValue.length > 35) {
             ctx.font = isHighlight ? 'bold 16px sans-serif' : 'bold 15px sans-serif';
          } else if(displayValue.length > 20) {
             ctx.font = isHighlight ? 'bold 20px sans-serif' : 'bold 18px sans-serif';
          } else {
             ctx.font = isHighlight ? 'bold 24px sans-serif' : 'bold 22px sans-serif';
          }
          
          ctx.fillText(displayValue, rightColX, currentY);
          currentY += rowSpacing;
        };

        // --- FIX: Shorten UUIDs safely so they don't jump out of the page ---
        const rawId = donation.id ? String(donation.id) : String(Math.floor(Math.random() * 10000));
        const shortId = rawId.includes('-') ? rawId.split('-')[0].toUpperCase() : rawId.padStart(4, '0');
        const receiptId = 'VLP-' + shortId;
        
        drawRow('Receipt ID :', receiptId, true);
        drawRow('Date / දිනය :', donation.date);
        drawRow('Donor Name / නම :', donation.name);
        drawRow('Contact / දුරකථන :', donation.phone_number);
        drawRow('Received By / සටහන් කළේ :', donation.reported_by);
        
        if (donation.donation_type === 'Cash') {
          drawRow('Category / වර්ගය :', donation.donor_category);
        } else {
          drawRow('Item / ද්‍රව්‍ය :', donation.item_description);
          drawRow('Quantity / ප්‍රමාණය :', donation.quantity.toString());
        }

        // Amount Box
        currentY += 20;
        
        // Highlight Box Background
        ctx.fillStyle = '#020617';
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 2;
        ctx.roundRect ? ctx.roundRect(80, currentY, width - 160, 140, 15) : ctx.strokeRect(80, currentY, width - 160, 140);
        ctx.fill();
        ctx.stroke();

        // Box Content
        ctx.textAlign = 'center';
        ctx.fillStyle = '#4ade80';
        ctx.font = '20px sans-serif';
        ctx.fillText(donation.donation_type === 'Cash' ? 'TOTAL DONATION AMOUNT' : 'TOTAL DONATION VALUE', width/2, currentY + 45);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 55px monospace';

        ctx.fillText(amountStr, width/2, currentY + 105);

        currentY += 200;

        // System Generated Stamp
        ctx.textAlign = 'center';
        ctx.fillStyle = '#334155';
        ctx.font = 'bold 16px sans-serif';
        ctx.fillText('★ SYSTEM GENERATED DIGITAL RECEIPT ★', width/2, currentY);

        currentY += 60;

        // Footer Contact Details
        ctx.fillStyle = '#64748b';
        ctx.font = '18px sans-serif';
        ctx.fillText('විමසීම් : දික්හේනපුර නව බුදුමැදුර අසල', width/2, currentY);

        ctx.fillText('isaradilnuka2005@gmail.com', width/2, currentY);

        // Final Thank you
        currentY += 60;

        ctx.font = 'italic 22px sans-serif';
        ctx.fillText('Thank you for your generous contribution!', width/2, currentY);
        ctx.font = '20px sans-serif';
        ctx.fillText('ඔබගේ වටිනා පරිත්‍යාගයට බොහෝ පින්.', width/2, currentY + 30);

    function ExportButtons({ onCsv, onPdf }) {

    const formatNumber = (amount) => {
      if(!amount) return "0.00";
      return parseFloat(amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const NumberCounter = ({ value, prefix = "LKR." }) => {
      const [count, setCount] = React.useState(0);
      
      React.useEffect(() => {
        let start = 0;
        const end = parseFloat(value);
        if(isNaN(end)) {
           setCount(value);
           return;
        }
        const duration = 1500;
        const increment = end / (duration / 16);
        const timer = setInterval(() => {
          start += increment;
          if (start >= end) {
            clearInterval(timer);
            setCount(end);
          } else {
            setCount(start);
          }
        }, 16);
        return () => clearInterval(timer);
      }, [value]);
      
      return (
        <span className="inline-flex items-baseline gap-1.5">
          <span className="text-base font-semibold opacity-60 tracking-normal">{prefix}</span>
          <span>{formatNumber(count)}</span>
        </span>
      );
    };

    function SimpleChart({ income, expense }) {
      const max = Math.max(income, expense, 1);
      const incomePct = (income / max) * 100;
      const expensePct = (expense / max) * 100;

      return (
        <div className="glass p-6 rounded-2xl flex flex-col justify-center border border-slate-800">
          <h3 className="text-xl font-semibold mb-6 flex flex-col gap-1 text-white">

            <span className="text-sm text-slate-400 font-normal">සමස්ථ ආදායම් සහ වියදම්</span>
          </h3>
          <div className="flex flex-col gap-6 w-full">
            <div>
              <div className="flex justify-between items-end mb-2">
                <div className="flex flex-col">
                  <span className="text-sm text-slate-300">Total Valid Income</span>
                  <span className="text-[10px] text-slate-500">මුළු මුදල් ආදායම</span>
                </div>
                <span className="text-sm font-bold text-brand-400">{formatCurrency(income)}</span>
              </div>
              <div className="w-full bg-slate-800 rounded-full h-4 overflow-hidden relative">
                <div className="bg-brand-500 h-4 rounded-full transition-all duration-1000" style={{width: `${incomePct}%`}}></div>
              </div>
            </div>
            <div>
              <div className="flex justify-between items-end mb-2">
                <div className="flex flex-col">
                  <span className="text-sm text-slate-300">Total Expenses</span>
                  <span className="text-[10px] text-slate-500">මුළු වියදම්</span>
                </div>
                <span className="text-sm font-bold text-red-400">{formatCurrency(expense)}</span>
              </div>
              <div className="w-full bg-slate-800 rounded-full h-4 overflow-hidden relative">
                <div className="bg-red-500 h-4 rounded-full transition-all duration-1000" style={{width: `${expensePct}%`}}></div>

    function TodayStatsChart({ incomes, expenses }) {
      const today = new Date().toISOString().split('T')[0];
      const todayIncome = incomes.filter(i => i.date === today && i.status === 'Received Today' && i.donation_type === 'Cash').reduce((sum, i) => sum + Number(i.amount || 0), 0);
      const todayExpense = expenses.filter(e => e.date === today).reduce((sum, e) => sum + Number(e.amount_taken || 0), 0);
      
      const max = Math.max(todayIncome, todayExpense, 1);
      const incPct = (todayIncome / max) * 100;
      const expPct = (todayExpense / max) * 100;

      return (
        <div className="glass p-6 rounded-2xl flex flex-col justify-center border border-slate-800">
          <h3 className="text-xl font-semibold mb-6 flex flex-col gap-1 text-white">
            <span>Today's Overview</span>
            <span className="text-sm text-slate-400 font-normal">අද දින සාරාංශය</span>
          </h3>
          <div className="flex flex-col gap-6 w-full">
            <div>
              <div className="flex justify-between items-end mb-2">

                  <span className="text-sm text-slate-300">Today's Income</span>
                </div>
                <span className="text-sm font-bold text-brand-400">{formatCurrency(todayIncome)}</span>
              </div>
              <div className="w-full bg-slate-800 rounded-full h-4 overflow-hidden relative">
                <div className="bg-brand-500 h-4 rounded-full transition-all duration-1000" style={{width: `${incPct}%`}}></div>
              </div>
            </div>
            <div>
              <div className="flex justify-between items-end mb-2">
                <div className="flex flex-col">
                  <span className="text-sm text-slate-300">Today's Expenses</span>
                </div>

      const data = days.map(day => {
        const dayIncomes = incomes.filter(i => i.date === day && i.status === 'Received Today' && i.donation_type === 'Cash');

        const exp = dayExpenses.reduce((sum, item) => sum + Number(item.amount_taken || 0), 0);
        const dObj = new Date(day);
        const label = dObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        return { date: day, label, inc, exp, dayIncomes, dayExpenses, dayGoods };
      });

      const maxVal = Math.max(...data.map(d => Math.max(d.inc, d.exp)), 100);

          <div className="w-full relative min-h-[200px] sm:min-h-[250px] overflow-hidden">
            <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-full drop-shadow-lg" preserveAspectRatio="xMidYMid meet">
              
              {/* Horizontal Grid Lines */}
              {[4, 3, 2, 1, 0].map(tick => {
                const y = margin.top + (chartHeight / 4) * tick;
                const v = (maxVal / 4) * (4 - tick);
                return (
                  <g key={tick}>
                    <line x1={margin.left} y1={y} x2={svgWidth - margin.right} y2={y} stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
                    <text x={margin.left - 10} y={y + 4} fill="#64748b" fontSize="12" textAnchor="end" fontFamily="sans-serif">
                      {formatYAxis(v)}
                    </text>
                  </g>
                );
              })}

              {/* Bars */}
              {data.map((d, i) => {
                const xCenter = margin.left + (chartWidth / 7) * (i + 0.5);
                const incHeight = (d.inc / maxVal) * chartHeight;
                const incY = margin.top + chartHeight - incHeight;
                const expHeight = (d.exp / maxVal) * chartHeight;
                const expY = margin.top + chartHeight - expHeight;
                const barWidth = 14;
                const spacing = 4;

                return (
                  <g key={i} className="group">
                    <rect x={xCenter - barWidth - spacing - 10} y={margin.top} width={(barWidth * 2) + spacing + 20} height={chartHeight} fill="transparent" className="hover:fill-slate-800/30 transition-colors duration-300" />
                    
                    <rect 
                      x={xCenter - barWidth - (spacing/2)} 
                      y={incY}

                      height={incHeight > 0 ? incHeight : 0} 
                      fill="#22c55e" 
                      rx="3" 
                      className="cursor-pointer transition-all duration-700 hover:brightness-125 hover:stroke-white stroke-1"

                    <rect 
                      x={xCenter + (spacing/2)} 
                      y={expY} 
                      width={barWidth} 
                      height={expHeight > 0 ? expHeight : 0}

                      rx="3" 
                      className="cursor-pointer transition-all duration-700 hover:brightness-125 hover:stroke-white stroke-1"

                      <title>View Expenses: Rs. {d.exp.toLocaleString()}</title>

                      {d.label.split(' ')[1]} {d.label.split(' ')[0]}

                  </g>

            </svg>
          </div>
          
          {selectedDetails ? (
            <div className="mt-4 bg-slate-900/80 p-4 border border-slate-700 rounded-xl animate-fade-in flex flex-col">
              <div className="flex justify-between items-center mb-4 border-b border-slate-700/50 pb-2">
                <h4 className={`font-semibold ${selectedDetails.type === 'income' ? 'text-brand-400' : selectedDetails.type === 'expense' ? 'text-red-400' : 'text-yellow-400'}`}>

    const VesakCountdown = () => {
      const [timeLeft, setTimeLeft] = useState({ d: 0, h: 0, m: 0, s: 0 });

      useEffect(() => {
        const target = new Date("2026-05-30T18:30:00").getTime();
        
        const update = () => {
          const now = new Date().getTime();
          const diff = target - now;
          if (diff <= 0) {
             setTimeLeft({ d: 0, h: 0, m: 0, s: 0 });
             return;
          }
          setTimeLeft({
            d: Math.floor(diff / (1000 * 60 * 60 * 24)),
            h: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
            m: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
            s: Math.floor((diff % (1000 * 60)) / 1000)
          });
        };
        
        update();
        const interval = setInterval(update, 1000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="glass rounded-2xl p-6 border border-slate-800 bg-gradient-to-br from-[#0f172a] to-slate-900 flex justify-between items-center sm:gap-6 flex-col sm:flex-row relative overflow-hidden group mb-8">

          </div>
          
          <div className="flex gap-1.5 sm:gap-4 z-10 text-center text-white justify-center w-full sm:w-auto overflow-x-auto py-2">

              <span className="text-xl sm:text-2xl font-bold text-brand-400 font-mono tracking-tight">{timeLeft.d}</span>

              <span className="text-xl sm:text-2xl font-bold text-brand-400 font-mono tracking-tight">{String(timeLeft.h).padStart(2, '0')}</span>
              <span className="text-[8px] sm:text-[9px] text-slate-400 uppercase tracking-widest mt-1">Hrs</span>
            </div>
            <div className="text-xl sm:text-2xl font-bold text-slate-600 mt-2">:</div>
            <div className="bg-slate-900/80 border border-slate-700 rounded-xl px-1.5 py-3 min-w-[55px] sm:min-w-[70px] shadow-lg flex flex-col items-center">
              <span className="text-xl sm:text-2xl font-bold text-brand-400 font-mono tracking-tight">{String(timeLeft.m).padStart(2, '0')}</span>
              <span className="text-[8px] sm:text-[9px] text-slate-400 uppercase tracking-widest mt-1">Mins</span>
            </div>
            <div className="text-xl sm:text-2xl font-bold text-slate-600 mt-2">:</div>

              <span className="text-[8px] sm:text-[9px] text-slate-400 uppercase tracking-widest mt-1">Secs</span>
            </div>
          </div>
        </div>
      );
    }

    function ExpenseList({ expenses, onRefresh }) {
      const [searchTerm, setSearchTerm] = useState('');
      const [sortBy, setSortBy] = useState('date-desc');
      const [filterDate, setFilterDate] = useState('');
      const [uploadingId, setUploadingId] = useState(null);

      const handleReceiptUpload = async (e, recordId) => {
        const file = e.target.files[0];
        if (!file) return;

        // Compress image client side
        setUploadingId(recordId);
        
        try {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = async () => {
             const img = new Image();
             img.src = reader.result;
             img.onload = async () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) {
                   height *= MAX_WIDTH / width;
                   width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);

                try {
                   const { error: fbErr } = await supabase.from('expenses').update({ receipt_url: compressedBase64 }).eq('id', recordId);
                   if (fbErr) throw fbErr;
                   alert("Receipt uploaded successfully! / බිල්පත සාර්ථකව උඩුගත කරන ලදි.");
                   if(onRefresh) onRefresh();
                } catch(err) {
                   alert("Error: To save receipts, please manually add a 'receipt_url' (Type: text) column to your 'expenses' table in Supabase!\nSupabase හි 'expenses' table එකට 'receipt_url' ලෙස අලුත් text column එකක් එකතු කරන්න!");
                } finally {
                   setUploadingId(null);
                }
             };
          };
        } catch (err) {
          alert('Failed to process image');
          setUploadingId(null);
        }
      };

      const validExpenses = expenses.filter(e => {
        if (filterDate && e.date !== filterDate) return false;
        if (searchTerm) {
          const lower = searchTerm.toLowerCase();
          return (e.reason?.toLowerCase().includes(lower) || 
                  e.withdrawer_name?.toLowerCase().includes(lower) ||
                  (e.amount_taken && e.amount_taken.toString().includes(lower)));
        }
        return true;
      });

      const sortedExpenses = [...validExpenses].sort((a, b) => {
        if (sortBy === 'date-desc') return new Date(b.date) - new Date(a.date);

        if (sortBy === 'amount-desc') return (b.amount_taken || 0) - (a.amount_taken || 0);
        if (sortBy === 'amount-asc') return (a.amount_taken || 0) - (b.amount_taken || 0);
        return 0;
      });

      const handleCSV = () => {
        const headers = ["Date", "Time", "Reason", "Withdrawer", "Amount"];

          formatDate(e.date), e.time, e.reason, e.withdrawer_name, e.amount_taken

            time: formData.time,
            amount_taken: parseFloat(formData.amount_taken),
            withdrawer_name: formData.withdrawer_name === 'Other' ? formData.custom_withdrawer : formData.withdrawer_name,

                   <input type="file" accept="image/*" onChange={(e) => setReceiptFile(e.target.files[0])} className="block w-full text-sm text-slate-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-slate-800 file:text-red-400 hover:file:bg-slate-700 transition mt-2" />
                 </div>
               </div>
            )}

            <div className="flex gap-4 mt-8">
              {step > 1 && (
                 <button type="button" onClick={() => setStep(step - 1)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-semibold py-4 px-6 rounded-lg transition-all duration-300 shadow-lg border border-slate-700">
                   Back / ආපසු
                 </button>
              )}
              {step < totalSteps && (
                 <button type="submit" className="flex-1 bg-red-600/80 hover:bg-red-500 text-white font-semibold py-4 px-6 rounded-lg transition-all duration-300 shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                   Next Step / මීලඟ පියවර
                 </button>
              )}
              {step === totalSteps && (
                 <button type="submit" disabled={loading} className="flex-1 bg-red-600 hover:bg-red-500 text-white font-semibold py-4 px-6 rounded-lg transition-all duration-300 shadow-[0_0_15px_rgba(239,68,68,0.4)] disabled:opacity-50">
                    {loading ? 'Saving...' : 'Save Record / වියදම වාර්තා කරන්න'}
                 </button>
              )}
            </div>
          </form>
        </div>
      );
    }

    function PromisedList({ incomes, onRefresh, showNotification }) {
      const promised = incomes.filter(i => i.status === 'Promised');
      const totalPromisedCash = promised.filter(i => i.donation_type === 'Cash').reduce((sum, item) => sum + Number(item.amount || 0), 0);
      const [loadingId, setLoadingId] = useState(null);

      const confirmReceipt = async (id) => {
        if(!window.confirm("Are you sure you received this donation? This will add it to the total balance.\nමෙම ආධාරය ලැබුණු බව තහවුරු කරනවාද?")) return;
        
        setLoadingId(id);
        try {
          const { error } = await supabase.from('incomes').update({ status: 'Received Today' }).eq('id', id);
          if (error) throw error;
          
          if(showNotification) {
             showNotification({
               type: 'success',
               title: 'Pledge Confirmed!',
               sTitle: 'ආධාරය තහවුරු කළා. මෙම මුදල මුළු ආදායමට එක්වී ඇත.'
             });
          }
          onRefresh();
        } catch (err) {
          if(showNotification) showNotification({ type: 'error', title: 'Error', sTitle: err.message });
          else alert("Error: " + err.message);
        } finally {
          setLoadingId(null);
        }
      };

      const handleCSV = () => {
        const headers = ["Date", "Name", "Phone", "Type", "Details", "Amount"];
        const rows = [headers, ...promised.map(p => [
          formatDate(p.date), p.name, p.phone_number || '-', p.donation_type, 
          p.donation_type === 'Goods' ? p.item_description : p.donor_category, 
          p.donation_type === 'Cash' ? p.amount : 'Goods'
        ])];
        exportToCSV("Pending_Pledges_Vesak", rows);
      };

      const handlePDF = () => {
        const headers = ["Date", "Name", "Details", "Type", "Amount"];
        const rows = promised.map(p => [
          formatDate(p.date), p.name, 
          p.donation_type === 'Goods' ? p.item_description : p.donor_category, 
          p.donation_type, p.donation_type === 'Cash' ? formatCurrency(p.amount) : 'Goods'
        ]);
        exportToPDF("Pending Pledges", headers, rows, "Pending_Pledges_Vesak");
      };

      return (
        <div className="glass rounded-2xl p-6 overflow-x-auto border border-slate-800">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
            <h2 className="text-xl font-bold text-white flex flex-col">
              <span>Pending Pledges (Promised Donations)</span>
              <span className="text-sm text-slate-400 font-normal mt-0.5">පොරොන්දු වූ පරිත්‍යාග</span>
            </h2>
            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
              <div className="bg-yellow-500/10 border border-yellow-500/20 px-4 py-2 rounded-xl flex flex-col sm:items-end">
                <span className="text-xs text-yellow-500/70 font-semibold uppercase tracking-wider">Total Promised / පොරොන්දු මුදල</span>
                <span className="text-lg font-bold text-yellow-400">{formatCurrency(totalPromisedCash)}</span>
              </div>
              <ExportButtons onCsv={handleCSV} onPdf={handlePDF} />
            </div>
          </div>
          
          {promised.length === 0 ? (
            <div className="text-center py-10 text-slate-400 border border-dashed border-slate-700 rounded-xl flex flex-col">
              <span>No pending pledges found.</span>
              <span className="text-xs mt-1">පොරොන්දු වූ ආධාර කිසිවක් නොමැත</span>
            </div>
          ) : (
            <div className="overflow-x-auto min-w-full">
              <table className="w-full text-left text-sm text-slate-300 min-w-[700px]">
                <thead className="text-xs text-slate-400 uppercase bg-slate-900/50">
                  <tr>
                    <th className="px-4 py-3 rounded-tl-lg">Date <br/><span className="text-[9px] font-normal tracking-wide text-brand-400">දිනය</span></th>
                    <th className="px-4 py-3">Donor Name <br/><span className="text-[9px] font-normal tracking-wide text-brand-400">ආධාරකරුගේ නම</span></th>
                    <th className="px-4 py-3">Details <br/><span className="text-[9px] font-normal tracking-wide text-brand-400">විස්තර</span></th>
                    <th className="px-4 py-3 text-right">Amount <br/><span className="text-[9px] font-normal tracking-wide text-brand-400">මුදල / ද්‍රව්‍ය</span></th>
                    <th className="px-4 py-3 rounded-tr-lg text-center">Action <br/><span className="text-[9px] font-normal tracking-wide text-brand-400">ක්‍රියාව</span></th>
                  </tr>
                </thead>
                <tbody>
                  {promised.map(p => (
                    <tr key={p.id} className="border-b border-slate-800 hover:bg-slate-800/30 transition">
                      <td className="px-4 py-4 whitespace-nowrap">{formatDate(p.date)}</td>
                      <td className="px-4 py-4 font-medium text-slate-200">
                        {p.name} 
                        {p.phone_number && <span className="block text-xs text-slate-500 font-normal mt-0.5">{p.phone_number}</span>}
                      </td>
                      <td className="px-4 py-4 truncate max-w-xs">{p.donation_type === 'Goods' ? p.item_description + ` (x${p.quantity})` : p.donor_category}</td>
                      <td className="px-4 py-4 text-right font-semibold text-yellow-400 whitespace-nowrap">
                        {p.donation_type === 'Cash' ? formatCurrency(p.amount) : 'Goods'}
                      </td>
                      <td className="px-4 py-4 text-center">
                        <button onClick={() => confirmReceipt(p.id)} disabled={loadingId === p.id} className="inline-flex items-center gap-1.5 px-3 py-2 bg-brand-500/20 text-brand-400 hover:bg-brand-500/30 border border-brand-500/50 rounded-lg transition text-xs font-semibold disabled:opacity-50">
                          <IconCheck /> 
                          <div className="flex flex-col text-left">
                            <span>{loadingId === p.id ? 'Confirming...' : 'Confirm'}</span>
                            {!loadingId && <span className="text-[9px] font-normal opacity-80">තහවුරු කරන්න</span>}
                          </div>
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    function NotificationToast({ show, data, onClose }) {
      if (!show || !data) return null;

      const isSuccess = data.type === 'success';

      return (
        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] animate-fade-in w-[90%] max-w-sm" style={{ marginTop: 'env(safe-area-inset-top)' }}>
          <div className="glass flex flex-col gap-2 p-4 rounded-xl border border-slate-700/50 shadow-[0_10px_40px_rgba(0,0,0,0.5)] relative overflow-hidden bg-slate-900/95 backdrop-blur-2xl">
            <div className={`absolute top-0 left-0 h-1 w-full ${isSuccess ? 'bg-brand-500' : 'bg-red-500'}`}></div>
            <button onClick={onClose} className="absolute top-3 right-3 text-slate-400 hover:text-white transition">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <div className="flex items-center gap-3 pr-6">
              <div className={`p-2 rounded-full shrink-0 ${isSuccess ? 'bg-brand-500/20 text-brand-400' : 'bg-red-500/20 text-red-400'}`}>
                {isSuccess ? <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg> : <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>}
              </div>
              <div className="flex flex-col">
                <span className="font-bold text-white text-[15px] leading-tight">{data.title}</span>
                <span className={`text-[11px] mt-0.5 ${isSuccess ? 'text-brand-300' : 'text-red-300'}`}>{data.sTitle}</span>
              </div>
            </div>
            
            {(data.details && data.details.length > 0) && (
              <div className="mt-3 text-xs bg-slate-950/50 rounded-lg p-3 flex flex-col gap-1.5 border border-slate-800/80 w-full">
                {data.details.map((d, i) => (
                  <div key={i} className="flex flex-col sm:flex-row sm:justify-between border-b border-slate-800/50 last:border-0 pb-1.5 last:pb-0 gap-0.5 sm:gap-2">
                    <span className="text-slate-400 font-medium">{d.label}:</span>
                    <span className={`font-semibold truncate w-full sm:w-auto text-left sm:text-right ${isSuccess ? 'text-brand-300' : 'text-slate-200'}`}>{d.value}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- MAIN APP COMPONENT ---
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [incomes, setIncomes] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [loading, setLoading] = useState(true);
      const [notification, setNotification] = useState(null);

      const showNotification = (data) => {
        setNotification(data);
        setTimeout(() => setNotification(null), 7000);
      };

      const fetchData = async () => {
        setLoading(true);
        try {
          const [incRes, expRes] = await Promise.all([
            supabase.from('incomes').select('*').order('created_at', { ascending: false }),
            supabase.from('expenses').select('*').order('created_at', { ascending: false })
          ]);
          
          if(incRes.error) console.error(incRes.error);
          else {
            const incData = incRes.data || [];
            setIncomes(incData);
            
            // Check for confetti condition!
            const totalCash = incData.filter(i => i.status === 'Received Today' && i.donation_type === 'Cash').reduce((sum, item) => sum + Number(item.amount || 0), 0);
            if(totalCash >= 80000 && activeTab === 'dashboard') {
              setTimeout(() => {
                window.confetti({
                  particleCount: 150,
                  spread: 80,
                  origin: { y: 0.1 },
                  colors: ['#22c55e', '#eab308', '#3b82f6', '#ec4899']
                });
              }, 800);
            }
          }

          if(expRes.error) console.error(expRes.error);
          else setExpenses(expRes.data || []);
          
        } catch(err) {
          console.error("Fetch error:", err);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchData();
      }, []);

      // Swipe Gestures for Mobile Navigation
      const handleTouchStart = (e) => {
        // Prevent swipe on tables and interactive scroll areas
        if (e.target.closest('.overflow-x-auto') || e.target.closest('table') || e.target.closest('input') || e.target.closest('textarea')) return;
        window.touchStartX = e.changedTouches[0].screenX;
        window.touchStartY = e.changedTouches[0].screenY;
      };

      const handleTouchEnd = (e) => {
        if (window.touchStartX === undefined || window.touchStartX === null) return;
        
        const touchEndX = e.changedTouches[0].screenX;
        const touchEndY = e.changedTouches[0].screenY;
        
        const deltaX = touchEndX - window.touchStartX;
        const deltaY = touchEndY - window.touchStartY;
        
        // Thresholds: min 70px horizontal, and horizontal must be 2x vertical
        if (Math.abs(deltaX) > 70 && Math.abs(deltaX) > Math.abs(deltaY) * 2) {
          const MAIN_TABS = ['dashboard', 'income-page', 'expense-page', 'pledges'];
          
          // Determine current base tab (handling sub-pages)
          let baseTab = activeTab;
          if (['income-list', 'goods-list'].includes(activeTab)) baseTab = 'income-page';
          if (activeTab === 'expense-list') baseTab = 'expense-page';
          
          const currentIndex = MAIN_TABS.indexOf(baseTab);
          
          if (currentIndex !== -1) {
            if (deltaX < 0 && currentIndex < MAIN_TABS.length - 1) {
              // Swipe Left -> Go Right
              setActiveTab(MAIN_TABS[currentIndex + 1]);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            } else if (deltaX > 0 && currentIndex > 0) {
              // Swipe Right -> Go Left
              setActiveTab(MAIN_TABS[currentIndex - 1]);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }
          }
        }
        window.touchStartX = null;
        window.touchStartY = null;
      };

      // Desktop Top Navigation Button
      const NavigationButton = ({ id, label, sLabel, icon }) => (
        <button
          onClick={() => setActiveTab(id)}
          className={`flex items-start gap-2.5 px-4 py-3 rounded-xl transition-all duration-300 w-auto ${
            activeTab === id 
            ? 'bg-brand-600/20 text-brand-400 shadow-[inset_0_0_12px_rgba(34,197,94,0.2)] border border-brand-500/30' 
            : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'
          }`}
        >
          <div className="mt-0.5">{icon}</div>
          <div className="flex flex-col text-left">
            <span className="font-semibold text-sm leading-tight">{label}</span>
            <span className="text-[10px] font-medium opacity-80 mt-0.5">{sLabel}</span>
          </div>
          {id === 'pledges' && incomes.filter(i => i.status === 'Promised').length > 0 && (
            <span className="ml-1 self-center px-1.5 py-0.5 rounded-full bg-yellow-500/20 text-yellow-500 text-xs font-bold border border-yellow-500/30">
              {incomes.filter(i => i.status === 'Promised').length}
            </span>
          )}
        </button>
      );

      // Mobile Bottom Fixed Navigation Button
      const MobileNavButton = ({ id, label, sLabel, icon }) => (
        <button
          onClick={() => setActiveTab(id)}
          className={`flex flex-col items-center justify-center flex-1 py-1.5 rounded-xl transition-all duration-300 relative ${
            activeTab === id 
            ? 'text-brand-400 font-bold bg-brand-500/10' 
            : 'text-slate-400 hover:text-slate-200'
          }`}
        >
          <div className={`mb-1 transition-transform duration-300 ${activeTab === id ? 'scale-110 drop-shadow-[0_0_8px_rgba(34,197,94,0.5)]' : ''}`}>
            {icon}
          </div>
          <span className="text-[10px] uppercase tracking-wide leading-none">{label}</span>
          <span className="text-[8px] font-normal opacity-80 mt-1">{sLabel}</span>
          
          {id === 'pledges' && incomes.filter(i => i.status === 'Promised').length > 0 && (
            <span className="absolute top-1 right-3 sm:right-6 w-2.5 h-2.5 rounded-full bg-yellow-500 border-2 border-slate-900 shadow-[0_0_8px_rgba(234,179,8,0.8)]"></span>
          )}
        </button>
      );

      return (
        <div className="flex flex-col min-h-screen pb-20 md:pb-0 relative">
          <NotificationToast show={!!notification} data={notification} onClose={() => setNotification(null)} />
          
          {/* Top Navigation with Safe Area (env) for Notch / Dynamic Island */}
          <header className="glass sticky top-0 z-50 border-b border-slate-800" style={{ paddingTop: 'env(safe-area-inset-top)' }}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between h-20 md:h-24">
                <div className="flex items-center gap-3 md:gap-4">
                  <div className="w-12 h-12 md:w-14 md:h-14 rounded-2xl bg-[#0f172a]/80 backdrop-blur-md flex items-center justify-center shrink-0 shadow-[0_0_15px_rgba(34,197,94,0.2)] border border-white/10 overflow-hidden">
                    <img src="logo.png" alt="App Logo" className="w-[80%] h-[80%] object-contain" />
                  </div>
                  <div className="flex flex-col justify-center">
                    <h1 className="text-lg md:text-xl font-bold tracking-tight text-white m-0 leading-tight">Vesak Lantern Project</h1>
                    <p className="text-brand-400 text-[10px] md:text-[11px] font-medium tracking-wide mt-0.5">වෙසක් කූඩු ව්‍යාපෘතිය</p>
                    <p className="text-slate-300 text-[10px] md:text-xs font-medium uppercase tracking-widest mt-0.5 md:mt-1">
                      Financial Dashboard <span className="text-[9px] md:text-[10px] opacity-70 ml-1">මූල්‍ය පාලක පුවරුව</span>
                    </p>
                  </div>
                </div>
              </div>
            </div>
            
            {/* Desktop Navigation */}
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-4 hidden md:block">
              <nav className="flex flex-wrap gap-2">
                <NavigationButton id="dashboard" label="Dashboard" sLabel="පාලක පුවරුව" icon={<IconDashboard />} />
                <NavigationButton id="income-page" label="Income" sLabel="ආදායම්" icon={<IconIncome />} />
                <NavigationButton id="expense-page" label="Expense" sLabel="වියදම්" icon={<IconExpense />} />
                <NavigationButton id="pledges" label="Pending Pledges" sLabel="පොරොන්දු" icon={<IconPledges />} />
              </nav>
            </div>
          </header>

          {/* Main Area with Safe Area Bottom Padding to prevent overlapping with bottom bar */}
          <main 
            className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 w-full z-10 relative" 
            style={{ paddingBottom: 'calc(env(safe-area-inset-bottom, 0px) + 6rem)' }}
            onTouchStart={handleTouchStart}
            onTouchEnd={handleTouchEnd}
          >
            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-brand-500/10 blur-[120px] rounded-full pointer-events-none"></div>
            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 rounded-full bg-blue-500/10 blur-[120px] pointer-events-none"></div>
            
            <div className="relative z-10 animate-fade-in">
                {activeTab === 'dashboard' && <DashboardView incomes={incomes} expenses={expenses} setActiveTab={setActiveTab} />}
                
                {activeTab === 'income-page' && (
                  <div className="space-y-8 animate-fade-in">
                    <IncomeForm onComplete={(data) => {
                      fetchData();
                      if(data) showNotification({
                        type: 'success',
                        title: 'Donation Added successfully!',
                        sTitle: 'ආධාර වාර්තාව සාර්ථකව එකතු කරන ලදි!',
                        details: [
                          { label: 'Name (නම)', value: data.name },
                          { label: 'Type (වර්ගය)', value: data.donation_type === 'Cash' ? 'Cash (මුදල්)' : 'Goods (ද්‍රව්‍ය)' },
                          { label: 'Amount/Qty (ප්‍රමාණය)', value: data.donation_type === 'Cash' ? formatCurrency(data.amount) : `${data.item_description} (x${data.quantity})` }
                        ]
                      });
                    }} />
                  </div>
                )}

                {activeTab === 'income-list' && (
                  <div className="space-y-8 animate-fade-in">
                    <IncomeList incomes={incomes} />
                  </div>
                )}
                
                {activeTab === 'goods-list' && (
                  <div className="space-y-8 animate-fade-in">
                    <GoodsList incomes={incomes} />
                  </div>
                )}
                
                {activeTab === 'expense-page' && (
                  <div className="space-y-8 animate-fade-in">
                    <ExpenseForm onComplete={(data) => {
                      fetchData();
                      if(data) showNotification({
                        type: 'blue',
                        title: 'Expense Recorded successfully!',
                        sTitle: 'වියදම් වාර්තාව සාර්ථකව එකතු කරන ලදි!',
                        details: [
                          { label: 'Reason (හේතුව)', value: data.reason },
                          { label: 'Amount (මුදල)', value: formatCurrency(data.amount_taken) },
                          { label: 'Withdrawer (ලබාගත්තේ)', value: data.withdrawer_name }
                        ]
                      });
                    }} />
                  </div>
                )}

                {activeTab === 'expense-list' && (
                  <div className="space-y-8 animate-fade-in">
                    <ExpenseList expenses={expenses} onRefresh={fetchData} />
                  </div>
                )}

                {activeTab === 'pledges' && <PromisedList incomes={incomes} onRefresh={fetchData} showNotification={showNotification} />}
            </div>
            
            <div className="text-center mt-12 mb-4 pb-20 md:pb-0">
               <a href="admin.html" className="text-xs text-slate-600 hover:text-slate-400 font-medium transition border-b border-transparent hover:border-slate-600 pb-0.5 inline-flex items-center gap-1.5 cursor-pointer">
                 <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                 System Administrator Dashboard
               </a>
            </div>
          </main>

          {/* Mobile Footer Navigation with Bottom Safe Area for iPhone Home Indicator */}
          <div className="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-slate-800/80 z-50 flex justify-between px-2 pt-2 bg-slate-950/90 backdrop-blur-xl" style={{ paddingBottom: 'calc(env(safe-area-inset-bottom, 0px) + 0.75rem)' }}>
            <MobileNavButton id="dashboard" label="Dashboard" sLabel="ආරම්භය" icon={<IconDashboard />} />
            <MobileNavButton id="income-page" label="Income" sLabel="ආදායම්" icon={<IconIncome />} />
            <MobileNavButton id="expense-page" label="Expense" sLabel="වියදම්" icon={<IconExpense />} />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(registration => {
          console.log('ServiceWorker registration successful');
        }).catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
